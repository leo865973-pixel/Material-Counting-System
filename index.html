                <Button variant="secondary" onClick={() => setDeleteConfirmTaskId(null)}>取消</Button>
                <Button variant="danger" onClick={confirmDeleteTask}>確認刪除</Button>
              </div>
            </div>
          </Modal>

          <TaskAccessModal 
            isOpen={!!accessModalTask} 
            onClose={() => setAccessModalTask(null)} 
            task={accessModalTask} 
            users={users} 
            currentUser={currentUser} 
            isConnected={isConnected}
          />
        </div>
      );
    };

    const MaterialManagement = ({ task, materials, onBack, onCount, onImportSuccess, currentUser, auditLogs, isConnected }) => {
      const [searchTerm, setSearchTerm] = useState('');
      const [filterType, setFilterType] = useState('all');
      const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
      const [isExcelModalOpen, setIsExcelModalOpen] = useState(false);
      const [isAddMaterialOpen, setIsAddMaterialOpen] = useState(false);
      const [isEditMaterialOpen, setIsEditMaterialOpen] = useState(false);
      const [isAuditLogOpen, setIsAuditLogOpen] = useState(false);
      const [deleteConfirmId, setDeleteConfirmId] = useState(null);
      const [viewRemarkMaterial, setViewRemarkMaterial] = useState(null);
      const [editFormData, setEditFormData] = useState(null);
      const [selectedMatIds, setSelectedMatIds] = useState(new Set());
      
      const [formData, setFormData] = useState({ 
        part_number: '', 
        part_code: '',
        part_name: '', 
        part_name_zh: '',
        target_qty: '', 
        usage_per_unit: '1',
        supplier: '',
        category: '',
        location: '',
        remark: '',
        tags: ''
      });

      const canEdit = ['admin', 'leader'].includes(currentUser.role);

      const processedMaterials = useMemo(() => {
        // 1. 搜尋與過濾
        let result = materials.filter((m) => {
          const matchesSearch = m.part_number.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                m.part_name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                (m.part_name_zh && m.part_name_zh.toLowerCase().includes(searchTerm.toLowerCase())) ||
                                (m.part_code && m.part_code.toLowerCase().includes(searchTerm.toLowerCase()));
          
          let matchesFilter = true;
          if (filterType === 'completed') matchesFilter = m.counted_qty >= m.target_qty;
          if (filterType === 'incomplete') matchesFilter = m.counted_qty < m.target_qty;
          if (filterType === 'excess') matchesFilter = m.counted_qty > m.target_qty;
          if (filterType === 'shortage') matchesFilter = m.counted_qty > 0 && m.counted_qty < m.target_qty;

          return matchesSearch && matchesFilter;
        });

        // 2. 排序
        if (sortConfig.key) {
          result.sort((a, b) => {
            let aVal = a[sortConfig.key];
            let bVal = b[sortConfig.key];
            
            if (sortConfig.key === 'diff') {
              aVal = a.counted_qty - a.target_qty;
              bVal = b.counted_qty - b.target_qty;
            }

            if (typeof aVal === 'string') {
               return sortConfig.direction === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
            }

            if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
            if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }

        return result;
      }, [materials, searchTerm, filterType, sortConfig]);

      const totalCount = materials.length;
      const completedCount = materials.filter(m => m.counted_qty >= m.target_qty).length;
      const incompleteCount = totalCount - completedCount;

      const handleSort = (key) => {
        let direction = 'asc';
        if (sortConfig.key === key && sortConfig.direction === 'asc') {
          direction = 'desc';
        }
        setSortConfig({ key, direction });
      };

      const toggleSelectMat = (id) => {
        setSelectedMatIds(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      };

      const toggleSelectAllMat = () => {
        if (selectedMatIds.size === processedMaterials.length) {
          setSelectedMatIds(new Set());
        } else {
          setSelectedMatIds(new Set(processedMaterials.map(m => m.id)));
        }
      };

      const executeBatchDeleteMat = () => {
        if (!isConnected) return showToast('系統未連線，無法刪除', 'error');
        if (selectedMatIds.size === 0) return;
        if (!confirm(`確定要刪除選取的 ${selectedMatIds.size} 筆物料嗎？此動作無法復原。`)) return;
        const updates = {};
        const toDelete = [...selectedMatIds];
        toDelete.forEach(id => { updates[`materials/${id}`] = null; });
        db.ref().update(updates).then(() => {
          db.ref('audit_logs').push({
            task_id: task.id,
            action: 'DELETE',
            action_label: '批次刪除物料',
            entity_name: `共 ${toDelete.length} 筆`,
            changes: [],
            user_name: currentUser.name,
            timestamp: new Date().toISOString()
          });
          showToast(`已刪除 ${toDelete.length} 筆物料`, 'success');
          setSelectedMatIds(new Set());
        });
      };

      const handleAddMaterial = (e) => {
        e.preventDefault();
        if (!isConnected) return showToast('系統未連線，請檢查網路狀態', 'error');
        if(!formData.part_number || !formData.target_qty) return showToast('UPG 與目標數量為必填', 'error');
        
        const parsedTags = formData.tags.split(',').map(t => t.trim()).filter(t => t).map(tagName => {
            const existing = MOCK_TAGS.find(mt => mt.name === tagName);
            return existing || { id: 'tag-'+Math.random().toString(36).substr(2,5), name: tagName, color: 'bg-[#f5f5f7] text-[#1d1d1f] border-none' };
        });

        const newRef = db.ref('materials').push();
        newRef.set({
          id: newRef.key,
          task_id: task.id,
          part_number: formData.part_number,
          part_code: formData.part_code,
          part_name: formData.part_name,
          part_name_zh: formData.part_name_zh || '',
          target_qty: Number(formData.target_qty),
          usage_per_unit: Number(formData.usage_per_unit) || 1,
          supplier: formData.supplier,
          category: formData.category,
          location: formData.location || '',
          remark: formData.remark || '',
          counted_qty: 0,
          status: 'pending',
          unit: 'PCS',
          tags: parsedTags
        }).then(() => {
          db.ref('audit_logs').push({
            task_id: task.id,
            action: 'CREATE',
            action_label: '新增物料',
            entity_name: formData.part_name || formData.part_number,
            changes: [
                { field: 'UPG', old: '', new: formData.part_number },
                { field: '目標數量', old: '', new: formData.target_qty }
            ],
            user_name: currentUser.name,
            timestamp: new Date().toISOString()
          });
          showToast('物料新增成功', 'success');
          setIsAddMaterialOpen(false);
          setFormData({ part_number: '', part_code: '', part_name: '', part_name_zh: '', target_qty: '', usage_per_unit: '1', supplier: '', category: '', location: '', remark: '', tags: '' });
        });
      };

      const handleEditMaterialClick = (mat) => {
        setEditFormData({
          ...mat,
          tags: (mat.tags || []).map(t => t.name).join(', ')
        });
        setIsEditMaterialOpen(true);
      };

      const handleUpdateMaterial = (e) => {
        e.preventDefault();
        if (!isConnected) return showToast('系統未連線，請檢查網路狀態', 'error');
        if(!editFormData.part_number || !editFormData.target_qty) return showToast('UPG 與目標數量為必填', 'error');
        
        const parsedTags = editFormData.tags.split(',').map(t => t.trim()).filter(t => t).map(tagName => {
            const existing = MOCK_TAGS.find(mt => mt.name === tagName);
            return existing || { id: 'tag-'+Math.random().toString(36).substr(2,5), name: tagName, color: 'bg-[#f5f5f7] text-[#1d1d1f] border-none' };
        });

        const originalMat = materials.find(m => m.id === editFormData.id);
        const diffs = [];
        const fieldsToCompare = [
            { key: 'part_number', label: 'UPG' },
            { key: 'part_code', label: '件號' },
            { key: 'part_name', label: '件名' },
            { key: 'part_name_zh', label: '中文件名' },
            { key: 'target_qty', label: '目標數量' },
            { key: 'usage_per_unit', label: '單台用量' },
            { key: 'supplier', label: '廠商' },
            { key: 'category', label: '零件分類' },
            { key: 'location', label: '儲位' },
            { key: 'remark', label: '備註' }
        ];
        
        fieldsToCompare.forEach(f => {
            if (String(originalMat[f.key] || '') !== String(editFormData[f.key] || '')) {
                diffs.push({ field: f.label, old: String(originalMat[f.key] || ''), new: String(editFormData[f.key] || '') });
            }
        });

        const oldTags = (originalMat.tags || []).map(t => t.name).join(', ');
        const newTags = parsedTags.map(t => t.name).join(', ');
        if (oldTags !== newTags) {
            diffs.push({ field: '標籤', old: oldTags, new: newTags });
        }

        if (diffs.length > 0) {
            db.ref(`materials/${editFormData.id}`).update({
              part_number: editFormData.part_number,
              part_code: editFormData.part_code,
              part_name: editFormData.part_name,
              part_name_zh: editFormData.part_name_zh || '',
              target_qty: Number(editFormData.target_qty),
              usage_per_unit: Number(editFormData.usage_per_unit) || 1,
              supplier: editFormData.supplier || '',
              category: editFormData.category || '',
              location: editFormData.location || '',
              remark: editFormData.remark || '',
              tags: parsedTags
            }).then(() => {
              db.ref('audit_logs').push({
                  task_id: task.id,
                  action: 'UPDATE',
                  action_label: '編輯物料',
                  entity_name: editFormData.part_name || editFormData.part_number,
                  changes: diffs,
                  user_name: currentUser.name,
                  timestamp: new Date().toISOString()
              });
              showToast('物料更新成功', 'success');
              setIsEditMaterialOpen(false);
            });
        } else {
            setIsEditMaterialOpen(false);
        }
      };

      const handleDeleteMaterial = (id) => {
        if (!isConnected) return showToast('系統未連線，請檢查網路狀態', 'error');
        setDeleteConfirmId(id);
      };

      const executeDeleteMaterial = () => {
        if (!deleteConfirmId) return;
        const matToDelete = materials.find(m => m.id === deleteConfirmId);
        db.ref(`materials/${deleteConfirmId}`).remove().then(() => {
          db.ref('audit_logs').push({
              task_id: task.id,
              action: 'DELETE',
              action_label: '刪除物料',
              entity_name: matToDelete?.part_name || matToDelete?.part_number || '未知物料',
              changes: [],
              user_name: currentUser.name,
              timestamp: new Date().toISOString()
          });
          showToast('物料已刪除', 'success');
          setDeleteConfirmId(null);
        }).catch(() => {
          showToast('刪除失敗', 'error');
          setDeleteConfirmId(null);
        });
      };

      return (
        <div className="space-y-4 sm:space-y-6 max-w-[1600px] mx-auto flex flex-col h-[calc(100vh-3rem)] animate-in fade-in duration-300">
          <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 shrink-0">
            <div className="flex items-center space-x-3 sm:space-x-4">
              <button onClick={onBack} className="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded-full bg-white border border-[#d2d2d7]/50 shadow-sm hover:bg-[#f5f5f7] transition-colors text-[#1d1d1f] shrink-0">
                <Icon name="ArrowLeft" className="w-4 h-4 sm:w-5 sm:h-5" />
              </button>
              <div>
                <h1 className="text-xl sm:text-2xl font-semibold tracking-tight text-[#1d1d1f] flex items-center line-clamp-1">
                  {task.title}
                </h1>
                <div className="flex flex-wrap items-center gap-1.5 sm:gap-2 mt-1.5 sm:mt-2">
                  <Badge className="bg-[#1d1d1f]/5 text-[#1d1d1f] border-none">總數: {totalCount}</Badge>
                  <Badge className="bg-[#34c759]/10 text-[#34c759] border-none">已完成: {completedCount}</Badge>
                  <Badge className="bg-[#ff9500]/10 text-[#ff9500] border-none">未完成: {incompleteCount}</Badge>
                </div>
              </div>
            </div>
            <div className="flex space-x-2 sm:space-x-3 w-full sm:w-auto overflow-x-auto pb-1 sm:pb-0">
              <Button variant="outline" onClick={() => setIsAuditLogOpen(true)} className="flex-1 sm:flex-none whitespace-nowrap bg-white">
                <Icon name="History" className="w-4 h-4 mr-1.5 sm:mr-2 text-[#86868b]" /> <span className="hidden sm:inline">操作紀錄</span><span className="sm:hidden">紀錄</span>
              </Button>
              {canEdit && selectedMatIds.size > 0 && (
                <Button variant="danger" onClick={executeBatchDeleteMat} className="flex-1 sm:flex-none whitespace-nowrap">
                  <Icon name="Trash2" className="w-4 h-4 mr-1.5" /> 刪除選取 ({selectedMatIds.size})
                </Button>
              )}
              {canEdit && (
                <>
                  <Button variant="secondary" onClick={() => setIsExcelModalOpen(true)} className="flex-1 sm:flex-none whitespace-nowrap">
                    <Icon name="FileSpreadsheet" className="w-4 h-4 mr-1.5 sm:mr-2 text-[#34c759]" /> <span className="hidden sm:inline">Excel 作業</span><span className="sm:hidden">Excel</span>
                  </Button>
                  <Button onClick={() => setIsAddMaterialOpen(true)} className="flex-1 sm:flex-none whitespace-nowrap">
                    <Icon name="Plus" className="w-4 h-4 mr-1.5 sm:mr-2" /> 新增物料
                  </Button>
                </>
              )}
            </div>
          </div>

          <div className="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3 shrink-0">
            <div className="relative flex-1 max-w-full sm:max-w-md">
              <Icon name="Search" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-[#86868b] pointer-events-none z-10" />
              <Input placeholder="搜尋UPG、件號、件名..." className="pl-11 bg-white shadow-sm border-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>
            </div>
            <select 
              className="flex h-11 rounded-xl border border-[#d2d2d7] bg-white px-4 py-2 text-sm text-[#1d1d1f] shadow-sm focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-[#0066cc]/10 focus-visible:border-[#0066cc] transition-all cursor-pointer w-full sm:w-auto"
              value={filterType}
              onChange={(e) => setFilterType(e.target.value)}
            >
              <option value="all">全部狀態</option>
              <option value="completed">已完成</option>
              <option value="incomplete">未完成</option>
              <option value="excess">過量</option>
              <option value="shortage">少缺</option>
            </select>
          </div>

          <Card className="flex-1 overflow-hidden p-0 rounded-2xl sm:rounded-3xl border-none shadow-[0_8px_30px_rgb(0,0,0,0.04)] bg-transparent lg:bg-white">
            <div className="overflow-auto h-full">
              <table className="w-full text-sm text-left whitespace-normal lg:whitespace-nowrap block lg:table">
                <thead className="bg-[#f5f5f7]/80 backdrop-blur-xl text-[#86868b] sticky top-0 z-10 border-b border-[#d2d2d7]/30 hidden lg:table-header-group">
                  <tr>
                    {canEdit && <th className="px-4 py-4 w-10 text-center"><input type="checkbox" className="w-4 h-4 rounded cursor-pointer" checked={selectedMatIds.size > 0 && selectedMatIds.size === processedMaterials.length} onChange={toggleSelectAllMat} /></th>}
                    <th className="px-4 py-4 font-semibold tracking-wide w-12 text-center">狀態</th>
                    <th className="px-4 py-4 font-semibold tracking-wide min-w-[220px] cursor-pointer hover:bg-[#d2d2d7]/30 transition-colors" onClick={() => handleSort('part_number')}>
                      <div className="flex items-center">
                        件號 / 件名 (UPG)
                        {sortConfig.key === 'part_number' && <Icon name={sortConfig.direction === 'asc' ? 'ChevronUp' : 'ChevronDown'} className="w-4 h-4 ml-1" />}
                      </div>
                    </th>
                    <th className="px-4 py-4 font-semibold tracking-wide w-24 text-center">分類</th>
                    <th className="px-4 py-4 font-semibold tracking-wide w-24 text-center">廠商</th>
                    <th className="px-4 py-4 font-semibold tracking-wide w-24 text-center">儲位</th>
                    <th className="px-4 py-4 font-semibold tracking-wide text-center w-20">單台用量</th>
                    <th className="px-4 py-4 font-semibold tracking-wide text-center w-20">目標</th>
                    <th className="px-4 py-4 font-semibold tracking-wide text-center w-20 cursor-pointer hover:bg-[#d2d2d7]/30 transition-colors" onClick={() => handleSort('counted_qty')}>
                      <div className="flex items-center justify-center">
                        已清點
                        {sortConfig.key === 'counted_qty' && <Icon name={sortConfig.direction === 'asc' ? 'ChevronUp' : 'ChevronDown'} className="w-4 h-4 ml-1" />}
                      </div>
                    </th>
                    <th className="px-4 py-4 font-semibold tracking-wide text-center w-20 cursor-pointer hover:bg-[#d2d2d7]/30 transition-colors" onClick={() => handleSort('diff')}>
                      <div className="flex items-center justify-center">
                        差異
                        {sortConfig.key === 'diff' && <Icon name={sortConfig.direction === 'asc' ? 'ChevronUp' : 'ChevronDown'} className="w-4 h-4 ml-1" />}
                      </div>
                    </th>
                    <th className="px-4 py-4 font-semibold tracking-wide text-center w-32">標籤</th>
                    <th className="px-4 py-4 font-semibold tracking-wide text-center sticky right-0 bg-[#f5f5f7]/80 backdrop-blur-xl shadow-[-10px_0_15px_-10px_rgba(0,0,0,0.05)] w-36">操作</th>
                  </tr>
                </thead>
                <tbody className="block lg:table-row-group divide-y divide-[#d2d2d7]/30 bg-transparent lg:bg-white/30 p-2 lg:p-0">
                  {processedMaterials.map((mat) => {
                    const diff = mat.counted_qty - mat.target_qty;
                    const isShort = diff < 0 && mat.counted_qty > 0;
                    const isDone = mat.counted_qty >= mat.target_qty;
                    
                    return (
                      <tr key={mat.id} className={`block lg:table-row hover:bg-[#f5f5f7]/50 transition-colors duration-200 group mb-4 lg:mb-0 rounded-2xl lg:rounded-none p-4 lg:p-0 shadow-sm lg:shadow-none border lg:border-none relative ${selectedMatIds.has(mat.id) ? 'bg-[#0066cc]/5 border-[#0066cc]/30' : 'bg-white border-[#d2d2d7]/50'}`}>
                        {canEdit && (
                          <td className="hidden lg:table-cell px-4 py-4">
                            <input type="checkbox" className="w-4 h-4 rounded cursor-pointer" checked={selectedMatIds.has(mat.id)} onChange={() => toggleSelectMat(mat.id)} onClick={e => e.stopPropagation()} />
                          </td>
                        )}
                        <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                          <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">狀態</span>
                          <div className={`w-2.5 h-2.5 rounded-full lg:mx-auto ${isDone ? 'bg-[#34c759] shadow-[0_0_8px_rgba(52,199,89,0.4)]' : (mat.counted_qty > 0 ? 'bg-[#0066cc] shadow-[0_0_8px_rgba(0,102,204,0.4)]' : 'bg-[#d2d2d7]')}`} />
                        </td>
                        <td className="flex lg:table-cell flex-col lg:flex-row items-start lg:items-center px-2 lg:px-4 py-3 lg:py-4 border-b border-[#f5f5f7] lg:border-none max-w-full lg:max-w-[280px] truncate">
                          <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider mb-1.5">件號 / 件名</span>
                          <div className="w-full">
                            <div className="flex items-center truncate mb-1.5">
                              {mat.part_code && <span className="bg-[#1d1d1f] text-white px-2.5 py-1 rounded-lg text-xs font-bold tracking-wider mr-2.5 shadow-sm shrink-0">{mat.part_code}</span>}
                              <span className="font-bold text-[#1d1d1f] text-base sm:text-lg tracking-tight truncate">
                                {mat.part_name} {mat.part_name_zh && <span className="ml-1">{mat.part_name_zh}</span>}
                              </span>
                              {mat.remark && (
                                <button onClick={() => setViewRemarkMaterial(mat)} className="ml-2 text-[#ff9500] hover:text-[#ff3b30] transition-colors shrink-0" title="查看備註">
                                  <Icon name="MessageSquareText" className="w-5 h-5" />
                                </button>
                              )}
                            </div>
                            <div className="text-[#86868b] text-xs truncate font-medium flex items-center">
                              <span className="mr-1.5 border border-[#d2d2d7] px-1.5 py-0.5 rounded text-[10px] text-[#86868b] font-bold">UPG</span>
                              {mat.part_number}
                            </div>
                          </div>
                        </td>
                        <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                          <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">分類</span>
                          <span className="text-[#86868b] font-medium truncate block lg:text-center">{mat.category || '-'}</span>
                        </td>
                        <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                          <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">廠商</span>
                          <span className="text-[#86868b] font-medium truncate block lg:text-center">{mat.supplier || '-'}</span>
                        </td>
                        <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                          <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">儲位</span>
                          <span className="text-[#1d1d1f] font-semibold truncate block lg:text-center">{mat.location || '-'}</span>
                        </td>
                        <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                          <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">單台用量</span>
                          <span className="block font-semibold text-[#1d1d1f] lg:text-center">{mat.usage_per_unit || 1}</span>
                        </td>
                        <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                          <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">目標</span>
                          <span className="block font-semibold text-[#1d1d1f] lg:text-center">{mat.target_qty}</span>
                        </td>
                        <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                          <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">已清點</span>
                          <span className={`block font-bold text-base lg:text-center ${mat.counted_qty > 0 ? 'text-[#0066cc]' : 'text-[#86868b]'}`}>{mat.counted_qty}</span>
                        </td>
                        <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                          <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">差異</span>
                          <span className={`block font-bold text-base lg:text-center ${isShort ? 'text-[#ff3b30]' : diff > 0 ? 'text-[#ff9500]' : 'text-[#86868b]'}`}>
                             {diff > 0 ? '+' : ''}{diff}
                          </span>
                        </td>
                        <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                          <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">標籤</span>
                          <div className="flex flex-wrap justify-end lg:justify-center gap-1.5">
                            {mat.tags?.map(tag => <Badge key={tag.id} className={tag.color}>{tag.name}</Badge>)}
                          </div>
                        </td>
                        <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-3 lg:py-4 lg:text-center lg:sticky lg:right-0 lg:bg-white group-hover:bg-[#f5f5f7]/50 transition-colors lg:shadow-[-10px_0_15px_-10px_rgba(0,0,0,0.02)]">
                          <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">操作</span>
                          <div className="flex items-center justify-end lg:justify-center space-x-2">
                            {canEdit && (
                              <input type="checkbox" className="lg:hidden w-4 h-4 rounded cursor-pointer mr-1" checked={selectedMatIds.has(mat.id)} onChange={() => toggleSelectMat(mat.id)} />
                            )}
                            <button onClick={() => onCount(mat.id)} className="bg-[#0066cc] text-white hover:bg-[#005bb5] transition-all duration-300 font-bold text-sm rounded-full px-4 py-2 shadow-[0_4px_12px_rgba(0,102,204,0.3)] active:scale-95 flex items-center">
                               <Icon name="Edit3" className="w-4 h-4 mr-1.5" /> 清點
                            </button>
                            {canEdit && (
                              <>
                                <button onClick={() => handleEditMaterialClick(mat)} className="text-[#86868b] hover:text-[#0066cc] transition-colors p-2 rounded-full hover:bg-[#0066cc]/10"><Icon name="Edit2" className="w-4 h-4" /></button>
                                <button onClick={() => handleDeleteMaterial(mat.id)} className="text-[#86868b] hover:text-[#ff3b30] transition-colors p-2 rounded-full hover:bg-[#ff3b30]/10"><Icon name="Trash2" className="w-4 h-4" /></button>
                              </>
                            )}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>
          
          <ExcelManagerModal isOpen={isExcelModalOpen} onClose={() => setIsExcelModalOpen(false)} task={task} materials={materials} onImportSuccess={onImportSuccess}/>
          
          <AuditLogModal isOpen={isAuditLogOpen} onClose={() => setIsAuditLogOpen(false)} logs={auditLogs} />

          <Modal isOpen={isAddMaterialOpen} onClose={() => setIsAddMaterialOpen(false)} title="新增單筆物料">
            <form onSubmit={handleAddMaterial} className="space-y-4 sm:space-y-5">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">UPG *</label>
                  <Input value={formData.part_number} onChange={e => setFormData({...formData, part_number: e.target.value})} placeholder="例如: MOT-A-0012" required/>
                </div>
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">件號</label>
                  <Input value={formData.part_code} onChange={e => setFormData({...formData, part_code: e.target.value})} placeholder="例如: PT-001" />
                </div>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">件名</label>
                  <Input value={formData.part_name} onChange={e => setFormData({...formData, part_name: e.target.value})} placeholder="例如: 定子鐵芯總成" />
                </div>
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">中文件名</label>
                  <Input value={formData.part_name_zh} onChange={e => setFormData({...formData, part_name_zh: e.target.value})} placeholder="例如: 定子铁芯总成" />
                </div>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">單台用量</label>
                  <Input type="number" min="1" value={formData.usage_per_unit} onChange={e => setFormData({...formData, usage_per_unit: e.target.value})} placeholder="1" />
                </div>
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">目標數量 *</label>
                  <Input type="number" min="1" value={formData.target_qty} onChange={e => setFormData({...formData, target_qty: e.target.value})} placeholder="0" required/>
                </div>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">廠商</label>
                  <Input value={formData.supplier} onChange={e => setFormData({...formData, supplier: e.target.value})} placeholder="例如: 供應商A" />
                </div>
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">零件分類</label>
                  <Input value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} placeholder="例如: 機構件" />
                </div>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">儲位 / 料架位置</label>
                  <Input value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} placeholder="例如: A01-01" />
                </div>
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">備註</label>
                  <Input value={formData.remark} onChange={e => setFormData({...formData, remark: e.target.value})} placeholder="輸入備註..." />
                </div>
              </div>
              <div>
                <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">標籤 (以逗號分隔)</label>
                <Input value={formData.tags} onChange={e => setFormData({...formData, tags: e.target.value})} placeholder="例如: 緊急件, 新件" />
              </div>
              <div className="pt-4 sm:pt-6 flex justify-end space-x-3">
                <Button type="button" variant="secondary" onClick={() => setIsAddMaterialOpen(false)}>取消</Button>
                <Button type="submit">確認新增</Button>
              </div>
            </form>
          </Modal>

          <Modal isOpen={isEditMaterialOpen} onClose={() => setIsEditMaterialOpen(false)} title="編輯單筆物料">
            {editFormData && (
              <form onSubmit={handleUpdateMaterial} className="space-y-4 sm:space-y-5">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
                  <div>
                    <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">UPG *</label>
                    <Input value={editFormData.part_number} onChange={e => setEditFormData({...editFormData, part_number: e.target.value})} required/>
                  </div>
                  <div>
                    <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">件號</label>
                    <Input value={editFormData.part_code} onChange={e => setEditFormData({...editFormData, part_code: e.target.value})} />
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
                  <div>
                    <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">件名</label>
                    <Input value={editFormData.part_name} onChange={e => setEditFormData({...editFormData, part_name: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">中文件名</label>
                    <Input value={editFormData.part_name_zh} onChange={e => setEditFormData({...editFormData, part_name_zh: e.target.value})} />
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
                  <div>
                    <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">單台用量</label>
                    <Input type="number" min="1" value={editFormData.usage_per_unit} onChange={e => setEditFormData({...editFormData, usage_per_unit: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">目標數量 *</label>
                    <Input type="number" min="1" value={editFormData.target_qty} onChange={e => setEditFormData({...editFormData, target_qty: e.target.value})} required/>
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
                  <div>
                    <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">廠商</label>
                    <Input value={editFormData.supplier} onChange={e => setEditFormData({...editFormData, supplier: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">零件分類</label>
                    <Input value={editFormData.category} onChange={e => setEditFormData({...editFormData, category: e.target.value})} />
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5">
                  <div>
                    <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">儲位 / 料架位置</label>
                    <Input value={editFormData.location} onChange={e => setEditFormData({...editFormData, location: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">備註</label>
                    <Input value={editFormData.remark} onChange={e => setEditFormData({...editFormData, remark: e.target.value})} />
                  </div>
                </div>
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">標籤 (以逗號分隔)</label>
                  <Input value={editFormData.tags} onChange={e => setEditFormData({...editFormData, tags: e.target.value})} />
                </div>
                <div className="pt-4 sm:pt-6 flex justify-end space-x-3">
                  <Button type="button" variant="secondary" onClick={() => setIsEditMaterialOpen(false)}>取消</Button>
                  <Button type="submit">儲存變更</Button>
                </div>
              </form>
            )}
          </Modal>

          <Modal isOpen={!!deleteConfirmId} onClose={() => setDeleteConfirmId(null)} title="確認刪除">
            <div className="space-y-4 sm:space-y-5">
              <div className="flex items-center justify-center p-4 bg-[#ff3b30]/10 rounded-2xl">
                <Icon name="AlertTriangle" className="w-8 h-8 text-[#ff3b30] mr-3" />
                <p className="text-[#1d1d1f] font-medium">確定要刪除此物料嗎？此動作無法復原。</p>
              </div>
              <div className="pt-4 sm:pt-6 flex justify-end space-x-3">
                <Button variant="secondary" onClick={() => setDeleteConfirmId(null)}>取消</Button>
                <Button variant="danger" onClick={executeDeleteMaterial}>確認刪除</Button>
              </div>
            </div>
          </Modal>

          <Modal isOpen={!!viewRemarkMaterial} onClose={() => setViewRemarkMaterial(null)} title="物料備註">
            {viewRemarkMaterial && (
              <div className="space-y-4 sm:space-y-5">
                <div className="bg-[#f5f5f7] p-4 rounded-2xl border border-[#d2d2d7]/50">
                  <div className="text-xs text-[#86868b] font-bold mb-1">UPG / 件名</div>
                  <div className="font-semibold text-[#1d1d1f]">{viewRemarkMaterial.part_number} - {viewRemarkMaterial.part_name}</div>
                </div>
                <div>
                  <div className="text-xs text-[#86868b] font-bold mb-2">備註內容</div>
                  <div className="bg-white p-4 rounded-2xl border border-[#ff9500]/30 shadow-sm text-[#1d1d1f] whitespace-pre-wrap leading-relaxed">
                    {viewRemarkMaterial.remark}
                  </div>
                </div>
                <div className="pt-4 sm:pt-6 flex justify-end">
                  <Button onClick={() => setViewRemarkMaterial(null)}>關閉</Button>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    };

    const CountMode = ({ material, onSave, onCancel }) => {
      const [qty, setQty] = useState(material.counted_qty);
      const [isPlaying, setIsPlaying] = useState(false);
      const diff = qty - material.target_qty;
      const progress = Math.min(100, Math.max(0, (qty / material.target_qty) * 100)) || 0;
      const isComplete = qty >= material.target_qty;
      const adjustQty = (amount) => setQty(Math.max(0, qty + amount));

      const handlePlayAudio = () => {
        if (isPlaying) return;
        setIsPlaying(true);
        const textToRead = `Item ${material.part_number}. Target quantity: ${material.target_qty}.`;
        playEdgeTTS(textToRead, 'en-US-AriaNeural').finally(() => setIsPlaying(false));
      };

      useEffect(() => {
        handlePlayAudio();
      }, []);

      return (
        <div className="flex flex-col h-full bg-[#f5f5f7] rounded-2xl sm:rounded-[2.5rem] overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.1)] absolute inset-0 z-30 m-2 sm:m-4 border border-white/50 animate-in zoom-in-95 duration-300">
          <div className="flex items-center justify-between p-4 sm:p-6 bg-white/60 backdrop-blur-3xl shrink-0 border-b border-[#d2d2d7]/30">
            <div className="flex items-center space-x-3 sm:space-x-5">
              <button onClick={onCancel} className="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded-full bg-white shadow-sm hover:bg-[#f5f5f7] transition-all active:scale-95 text-[#1d1d1f] shrink-0">
                <Icon name="ArrowLeft" className="w-5 h-5 sm:w-6 sm:h-6" />
              </button>
              <div className="truncate flex items-center gap-3">
                <div>
                  <div className="flex items-center gap-2 sm:gap-3 truncate mb-1">
                    {material.part_code && <span className="bg-[#1d1d1f] text-white px-2 sm:px-3 py-1 rounded-lg text-xs sm:text-sm font-bold tracking-wider shadow-sm">{material.part_code}</span>}
                    <h2 className="text-lg sm:text-2xl font-bold tracking-tight text-[#1d1d1f] truncate">
                      {material.part_name} {material.part_name_zh && <span className="hidden sm:inline-block ml-1">{material.part_name_zh}</span>}
                    </h2>
                  </div>
                  <p className="text-[#86868b] text-[10px] sm:text-xs font-medium flex items-center">
                    <span className="mr-1.5 border border-[#d2d2d7] px-1.5 py-0.5 rounded text-[9px] sm:text-[10px] font-bold">UPG</span>
                    {material.part_number}
                  </p>
                </div>
                <button onClick={handlePlayAudio} disabled={isPlaying} className={`p-2.5 rounded-full transition-all shrink-0 ${isPlaying ? 'text-[#0066cc] bg-[#0066cc]/10 animate-pulse' : 'text-[#86868b] hover:bg-[#f5f5f7] hover:text-[#1d1d1f]'}`} title="播放語音">
                  <Icon name={isPlaying ? "VolumeX" : "Volume2"} className="w-5 h-5" />
                </button>
              </div>
            </div>
            <div className="flex items-center space-x-3 sm:space-x-4">
              <Badge className={`hidden md:inline-flex px-4 py-1.5 text-sm ${isComplete ? 'bg-[#34c759]/10 text-[#34c759] border-none' : 'bg-[#0066cc]/10 text-[#0066cc] border-none'}`}>
                {isComplete ? '達標' : '清點中'}
              </Badge>
              <Button size="lg" onClick={() => onSave(qty)} className="h-10 sm:h-12 px-4 sm:px-6 text-sm sm:text-base shadow-[0_8px_20px_rgba(0,0,0,0.12)] shrink-0">
                <Icon name="Check" className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5 sm:mr-2" /> <span className="hidden sm:inline">儲存並返回</span><span className="sm:hidden">儲存</span>
              </Button>
            </div>
          </div>

          <div className="flex-1 overflow-auto flex flex-col lg:flex-row bg-white/40 backdrop-blur-xl">
            <div className="p-6 sm:p-8 lg:p-12 border-b lg:border-b-0 lg:border-r border-[#d2d2d7]/30 flex flex-col space-y-6 sm:space-y-8 lg:w-1/2 justify-center">
              <div className="grid grid-cols-2 gap-4 sm:gap-6 mb-2 sm:mb-6">
                <div className="space-y-2 sm:space-y-3">
                  <label className="text-[10px] sm:text-xs font-bold text-[#86868b] uppercase tracking-widest">廠商 / 分類</label>
                  <div className="text-sm sm:text-lg font-semibold text-[#1d1d1f] bg-white/80 backdrop-blur-md p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-[#d2d2d7]/30 shadow-sm truncate">
                    {material.supplier || '-'} / {material.category || '-'}
                  </div>
                </div>
                <div className="space-y-2 sm:space-y-3">
                  <label className="text-[10px] sm:text-xs font-bold text-[#86868b] uppercase tracking-widest">儲位</label>
                  <div className="text-sm sm:text-lg font-semibold text-[#1d1d1f] bg-white/80 backdrop-blur-md p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-[#d2d2d7]/30 shadow-sm truncate">
                    {material.location || '-'}
                  </div>
                </div>
              </div>
              <div className="space-y-2 sm:space-y-3 mb-4 sm:mb-8">
                <label className="text-[10px] sm:text-xs font-bold text-[#86868b] uppercase tracking-widest">狀態</label>
                <div className="h-[50px] sm:h-[62px] flex items-center bg-white/80 backdrop-blur-md px-3 sm:px-4 rounded-xl sm:rounded-2xl border border-[#d2d2d7]/30 shadow-sm text-sm sm:text-base">
                  {diff < 0 && qty > 0 ? <span className="text-[#ff3b30] flex font-semibold"><Icon name="AlertTriangle" className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5 sm:mr-2"/> 數量不足</span> : 
                   isComplete ? <span className="text-[#34c759] flex font-semibold"><Icon name="CheckCircle2" className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5 sm:mr-2"/> 已完成</span> : 
                   <span className="text-[#86868b] font-medium">未完成</span>}
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4 sm:gap-6">
                <div className="space-y-1.5 sm:space-y-2 bg-white/80 backdrop-blur-md p-4 sm:p-6 rounded-2xl sm:rounded-[2rem] border border-[#d2d2d7]/30 text-center shadow-sm">
                  <label className="text-xs sm:text-sm font-semibold text-[#86868b]">目標數量</label>
                  <div className="text-3xl sm:text-5xl font-light tracking-tighter text-[#1d1d1f] mt-1 sm:mt-2">{material.target_qty}</div>
                </div>
                <div className="space-y-1.5 sm:space-y-2 bg-white/80 backdrop-blur-md p-4 sm:p-6 rounded-2xl sm:rounded-[2rem] border border-[#0066cc]/20 text-center relative overflow-hidden shadow-[0_8px_30px_rgba(0,102,204,0.08)]">
                  <div className="absolute inset-0 bg-[#0066cc]/5 pointer-events-none" style={{height: `${progress}%`, bottom: 0, top: 'auto', transition: 'height 0.5s ease-out'}}></div>
                  <label className="text-xs sm:text-sm font-semibold text-[#0066cc] relative z-10">已清點</label>
                  <div className="text-3xl sm:text-5xl font-light tracking-tighter text-[#0066cc] relative z-10 mt-1 sm:mt-2">{qty}</div>
                </div>
              </div>
              
              <div className="pt-6 sm:pt-8 flex items-center justify-between border-t border-[#d2d2d7]/30">
                 <span className="text-[#86868b] font-semibold text-sm sm:text-lg">差異數量 (Diff)</span>
                 <div className={`text-4xl sm:text-6xl font-light tracking-tighter ${diff < 0 ? 'text-[#ff3b30]' : diff > 0 ? 'text-[#ff9500]' : 'text-[#34c759]'}`}>
                    {diff > 0 ? '+' : ''}{diff}
                 </div>
              </div>
            </div>

            <div className="p-6 sm:p-8 lg:p-12 flex flex-col items-center justify-center lg:w-1/2 relative">
              <div className="w-full max-w-md space-y-6 sm:space-y-8 relative z-10">
                <div className="relative group">
                  <input type="number" value={qty} onChange={(e) => setQty(Number(e.target.value))}
                    className="w-full text-center text-6xl sm:text-[5rem] font-light tracking-tighter bg-white border-none rounded-[2rem] sm:rounded-[2.5rem] py-6 sm:py-8 text-[#1d1d1f] focus:ring-4 focus:ring-[#0066cc]/20 transition-all outline-none shadow-[0_8px_40px_rgba(0,0,0,0.06)]"
                  />
                </div>
                <div className="grid grid-cols-3 gap-3 sm:gap-4">
                  <button onClick={() => adjustQty(-1)} className="h-16 sm:h-20 text-2xl sm:text-3xl flex items-center justify-center bg-white rounded-2xl sm:rounded-3xl shadow-sm hover:bg-[#f5f5f7] active:scale-95 transition-all text-[#1d1d1f]"><Icon name="Minus" className="w-6 h-6 sm:w-8 sm:h-8" /></button>
                  <button onClick={() => adjustQty(1)} className="h-16 sm:h-20 text-2xl sm:text-3xl font-medium flex items-center justify-center bg-white rounded-2xl sm:rounded-3xl shadow-sm hover:bg-[#f5f5f7] active:scale-95 transition-all text-[#0066cc]">+1</button>
                  <button onClick={() => adjustQty(5)} className="h-16 sm:h-20 text-2xl sm:text-3xl font-medium flex items-center justify-center bg-white rounded-2xl sm:rounded-3xl shadow-sm hover:bg-[#f5f5f7] active:scale-95 transition-all text-[#0066cc]">+5</button>
                  <button onClick={() => setQty(0)} className="h-12 sm:h-16 text-sm sm:text-lg font-semibold flex items-center justify-center bg-white/50 rounded-xl sm:rounded-2xl hover:bg-white active:scale-95 transition-all text-[#86868b]">歸零</button>
                  <button onClick={() => adjustQty(10)} className="h-12 sm:h-16 text-lg sm:text-2xl font-medium flex items-center justify-center bg-white rounded-xl sm:rounded-2xl shadow-sm hover:bg-[#f5f5f7] active:scale-95 transition-all text-[#0066cc]">+10</button>
                  <button onClick={() => setQty(material.target_qty)} className="h-12 sm:h-16 text-sm sm:text-lg font-semibold flex items-center justify-center bg-[#34c759]/10 rounded-xl sm:rounded-2xl hover:bg-[#34c759]/20 active:scale-95 transition-all text-[#34c759]">補滿</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================================
    // Vehicle Model Management Components
    // ============================================================================

    const VehicleExcelManagerModal = ({ isOpen, onClose, section, materials, onImportSuccess }) => {
      const [activeTab, setActiveTab] = useState('import');
      const [isProcessing, setIsProcessing] = useState(false);
      const [importPreview, setImportPreview] = useState([]);
      const [importErrors, setImportErrors] = useState([]);
      const fileInputRef = useRef(null);

      if (!isOpen) return null;

      const loadXLSX = () => {
        if (window.XLSX) return window.XLSX;
        showToast("Excel 模組尚未載入完成", "error");
        return null;
      };

      const handleDownloadTemplate = () => {
        const XLSX = loadXLSX();
        if (!XLSX) return;
        const templateData = [{ 
          "UPG": "VM-0012", 
          "件號": "VP-001",
          "件名": "前保桿", 
          "中文件名": "前保险杠",
          "單位": "PCS", 
          "單台用量": 1,
          "廠商": "車體廠A", 
          "零件分類": "外觀件",
          "儲位": "V01",
          "規格參數": "長寬高: 120x30x40",
          "分組": "車頭組立",
          "標籤": "外包,沿用件",
          "備註": "" 
        }];
        const ws = XLSX.utils.json_to_sheet(templateData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "匯入範本");
        XLSX.writeFile(wb, "車型物料_匯入範本.xlsx");
      };

      const handleExport = () => {
        const XLSX = loadXLSX();
        if (!XLSX) return;
        const exportData = materials.map(m => ({
          "UPG": m.part_number, 
          "件號": m.part_code || '',
          "件名": m.part_name, 
          "中文件名": m.part_name_zh || '',
          "單位": m.unit || 'PCS',
          "單台用量": m.usage_per_unit || 1,
          "廠商": m.supplier || '', 
          "零件分類": m.category || '',
          "儲位": m.location || '',
          "規格參數": m.spec_params || '',
          "分組": m.assembly_group || '',
          "標籤": (m.tags || []).map(t => t.name).join(','),
          "備註": m.remark || ''
        }));
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "物料清單");
        XLSX.writeFile(wb, `[${section.name}]_物料清單.xlsx`);
        showToast("匯出成功", "success");
      };

      const handleFileUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        setIsProcessing(true);
        const XLSX = loadXLSX();
        if (!XLSX) return setIsProcessing(false);

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const wb = XLSX.read(evt.target?.result, { type: 'binary' });
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            const errors = [];
            const previewData = [];

            data.forEach((row, i) => {
              const rowNum = i + 2;
              const rowErrs = [];
              const partNo = String(row['UPG'] || '').trim();

              if (!partNo) rowErrs.push("缺UPG");
              if (partNo && materials.some(m => m.part_number === partNo)) rowErrs.push("系統已存在");

              if (rowErrs.length > 0) errors.push({ row: rowNum, errors: rowErrs });
              previewData.push({ ...row, _rowNum: rowNum, _errors: rowErrs });
            });

            setImportErrors(errors);
            setImportPreview(previewData);
          } catch (error) {
            showToast("解析失敗", "error");
          } finally {
            setIsProcessing(false);
            if (fileInputRef.current) fileInputRef.current.value = '';
          }
        };
        reader.readAsBinaryString(file);
      };

      const confirmImport = () => {
        const newMaterials = importPreview
          .filter(row => row._errors.length === 0)
          .map(row => {
            const newRef = db.ref('vehicle_materials').push();
            const tagsStr = String(row['標籤'] || '');
            const parsedTags = tagsStr.split(',').map(t => t.trim()).filter(t => t).map(tagName => {
                const existing = MOCK_TAGS.find(mt => mt.name === tagName);
                return existing || { id: 'tag-'+Math.random().toString(36).substr(2,5), name: tagName, color: 'bg-[#f5f5f7] text-[#1d1d1f] border-[#d2d2d7]' };
            });

            return {
              id: newRef.key,
              section_id: section.id,
              part_number: String(row['UPG']).trim(),
              part_code: String(row['件號'] || '').trim(),
              part_name: String(row['件名'] || ''),
              part_name_zh: String(row['中文件名'] || ''),
              unit: String(row['單位'] || 'PCS'),
              usage_per_unit: Number(row['單台用量']) || 1,
              supplier: String(row['廠商'] || row['供應商'] || ''),
              category: String(row['零件分類'] || ''),
              location: String(row['儲位'] || ''),
              spec_params: String(row['規格參數'] || ''),
              assembly_group: String(row['分組'] || ''),
              remark: String(row['備註'] || ''),
              tags: parsedTags,
              image: ''
            };
          });
        if (newMaterials.length > 0) {
          onImportSuccess(newMaterials);
          onClose();
        }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-[#1d1d1f]/20 backdrop-blur-sm p-4 transition-all duration-300">
          <div className="bg-white/90 backdrop-blur-3xl border border-[#d2d2d7]/50 rounded-[2rem] shadow-[0_20px_40px_rgba(0,0,0,0.1)] w-full max-w-2xl flex flex-col max-h-[85vh] overflow-hidden animate-in fade-in zoom-in-95 duration-200">
            <div className="flex items-center justify-between p-5 sm:p-6 border-b border-[#d2d2d7]/30 shrink-0">
              <h2 className="text-lg sm:text-xl font-semibold tracking-tight text-[#1d1d1f] flex items-center"><Icon name="FileSpreadsheet" className="w-5 h-5 mr-2 text-[#34c759]"/> 車型物料批次作業</h2>
              <button onClick={onClose} className="text-[#86868b] hover:text-[#1d1d1f] transition-colors bg-[#f5f5f7] hover:bg-[#e5e5ea] p-2 rounded-full"><Icon name="X" className="w-5 h-5"/></button>
            </div>
            <div className="flex p-2 bg-[#f5f5f7] m-4 sm:m-6 rounded-xl shrink-0">
              <button className={`flex-1 py-2 text-sm font-medium rounded-lg transition-all ${activeTab === 'import' ? 'bg-white text-[#1d1d1f] shadow-sm' : 'text-[#86868b] hover:text-[#1d1d1f]'}`} onClick={() => setActiveTab('import')}>匯入資料</button>
              <button className={`flex-1 py-2 text-sm font-medium rounded-lg transition-all ${activeTab === 'export' ? 'bg-white text-[#1d1d1f] shadow-sm' : 'text-[#86868b] hover:text-[#1d1d1f]'}`} onClick={() => setActiveTab('export')}>匯出報表</button>
            </div>
            <div className="px-4 sm:px-6 pb-6 overflow-auto flex-1">
              {activeTab === 'import' ? (
                <div className="space-y-4">
                  <div className="flex flex-col sm:flex-row justify-between bg-white p-4 sm:p-5 rounded-2xl border border-[#d2d2d7]/50 items-start sm:items-center shadow-sm gap-3 sm:gap-0">
                    <span className="text-sm text-[#1d1d1f] font-medium">1. 下載標準格式範本</span>
                    <Button variant="secondary" size="sm" onClick={handleDownloadTemplate} className="w-full sm:w-auto">下載範本</Button>
                  </div>
                  <div className="flex flex-col sm:flex-row justify-between bg-white p-4 sm:p-5 rounded-2xl border border-[#d2d2d7]/50 items-start sm:items-center shadow-sm gap-3 sm:gap-0">
                    <span className="text-sm text-[#1d1d1f] font-medium">2. 上傳填寫好的資料</span>
                    <input type="file" accept=".xlsx" className="hidden" ref={fileInputRef} onChange={handleFileUpload} />
                    <Button onClick={() => fileInputRef.current?.click()} isLoading={isProcessing} className="w-full sm:w-auto"><Icon name="Upload" className="w-4 h-4 mr-2"/>上傳檔案</Button>
                  </div>
                  {importPreview.length > 0 && (
                    <div className="mt-6 border border-[#d2d2d7]/50 rounded-2xl overflow-hidden text-sm bg-white shadow-sm">
                       <div className="bg-[#f5f5f7] p-4 flex justify-between font-medium border-b border-[#d2d2d7]/50">
                         <span className="text-[#34c759]">✅ 成功: {importPreview.length - importErrors.length}</span>
                         <span className="text-[#ff3b30]">❌ 失敗: {importErrors.length}</span>
                       </div>
                       <div className="max-h-64 overflow-auto">
                          {importPreview.map((row, i) => (
                            <div key={i} className={`p-3 border-b border-[#f5f5f7] ${row._errors.length > 0 ? 'bg-[#ff3b30]/5' : ''}`}>
                              <div className="flex items-center">
                                <div className="w-20 sm:w-24 text-[#86868b] font-mono text-xs truncate shrink-0 mr-2">第 {row._rowNum} 行</div>
                                <div className="w-24 sm:w-32 text-[#1d1d1f] font-medium truncate mr-2">{row['UPG'] || '(no UPG)'}</div>
                                <div className="flex-1 text-[#1d1d1f] truncate mr-2">{row['件名'] || ''}</div>
                                <div className="shrink-0">
                                   {row._errors.length > 0 ? <span className="text-[#ff3b30] text-xs font-semibold">✗ 有錯誤</span> : <span className="text-[#34c759] text-xs font-semibold">✓ 通過</span>}
                                </div>
                              </div>
                              {row._errors.length > 0 && (
                                <div className="mt-1.5 flex flex-wrap gap-1">
                                  {row._errors.map((err, ei) => (
                                    <span key={ei} className="text-[10px] bg-[#ff3b30]/10 text-[#ff3b30] px-2 py-0.5 rounded font-medium">{err}</span>
                                  ))}
                                </div>
                              )}
                            </div>
                          ))}
                       </div>
                    </div>
                  )}
                </div>
              ) : (
                 <div className="text-center py-12 sm:py-16 space-y-6">
                    <div className="w-16 h-16 sm:w-20 sm:h-20 bg-[#0066cc]/10 rounded-full flex items-center justify-center mx-auto">
                      <Icon name="Download" className="w-8 h-8 sm:w-10 sm:h-10 text-[#0066cc]" />
                    </div>
                    <p className="text-[#86868b] font-medium text-sm sm:text-base">匯出目前部位的物料清單</p>
                    <Button onClick={handleExport} size="lg" className="rounded-2xl w-full sm:w-auto"><Icon name="FileSpreadsheet" className="w-5 h-5 mr-2" /> 產生 Excel</Button>
                 </div>
              )}
            </div>
            {activeTab === 'import' && importPreview.length > 0 && (
              <div className="p-4 sm:p-6 border-t border-[#d2d2d7]/30 bg-[#f5f5f7]/50 flex justify-end shrink-0">
                <Button variant="primary" onClick={confirmImport} disabled={importPreview.length === importErrors.length} className="w-full sm:w-auto">確認匯入資料</Button>
              </div>
            )}
          </div>
        </div>
      );
    };

    const VehicleModelList = ({ models, onSelectModel, currentUser, isConnected }) => {

    const VehicleMaterialManagement = ({ model, section, materials, onBack, currentUser, isConnected, onImportSuccess }) => {
      const [searchTerm, setSearchTerm] = useState('');
      const [filterGroup, setFilterGroup] = useState('all');
      const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });

      const [isExcelModalOpen, setIsExcelModalOpen] = useState(false);
      const [isAddMaterialOpen, setIsAddMaterialOpen] = useState(false);
      const [isEditMaterialOpen, setIsEditMaterialOpen] = useState(false);
      const [deleteConfirmId, setDeleteConfirmId] = useState(null);
      const [editFormData, setEditFormData] = useState(null);
      
      const [hoverPos, setHoverPos] = useState({x: 0, y: 0});
      const [hoverMat, setHoverMat] = useState(null);

      const [selectedIds, setSelectedIds] = useState(new Set());

      const [formData, setFormData] = useState({ 
        part_number: '', part_code: '', part_name: '', part_name_zh: '', usage_per_unit: '1', supplier: '', category: '', location: '', remark: '', tags: '', spec_params: '', assembly_group: '', image: ''
      });

      const canEdit = ['admin', 'leader'].includes(currentUser.role);

      const uniqueGroups = useMemo(() => {
        const groups = new Set(materials.map(m => m.assembly_group).filter(Boolean));
        return Array.from(groups).sort();
      }, [materials]);

      const processedMaterials = useMemo(() => {
        let result = materials.filter((m) => {
          const matchSearch = m.part_number.toLowerCase().includes(searchTerm.toLowerCase()) ||
                 m.part_name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                 (m.part_code && m.part_code.toLowerCase().includes(searchTerm.toLowerCase()));
          const matchGroup = filterGroup === 'all' || m.assembly_group === filterGroup;
          return matchSearch && matchGroup;
        });

        if (sortConfig.key) {
          result.sort((a, b) => {
            let aVal = a[sortConfig.key] || '';
            let bVal = b[sortConfig.key] || '';
            
            if (typeof aVal === 'string') {
               return sortConfig.direction === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
            }
            if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
            if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
          });
        }
        return result;
      }, [materials, searchTerm, filterGroup, sortConfig]);

      const handleSort = (key) => {
        let direction = 'asc';
        if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
        setSortConfig({ key, direction });
      };

      const handlePasteImage = (e, isEdit = false) => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let index in items) {
          const item = items[index];
          if (item.kind === 'file') {
            const blob = item.getAsFile();
            const reader = new FileReader();
            reader.onload = (event) => {
              if (isEdit) {
                setEditFormData(prev => ({...prev, image: event.target.result}));
              } else {
                setFormData(prev => ({...prev, image: event.target.result}));
              }
            };
            reader.readAsDataURL(blob);
          }
        }
      };

      const toggleSelect = (id) => {
        setSelectedIds(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      };

      const toggleSelectAll = () => {
        if (selectedIds.size === processedMaterials.length) {
          setSelectedIds(new Set());
        } else {
          setSelectedIds(new Set(processedMaterials.map(m => m.id)));
        }
      };

      const executeBatchDelete = () => {
        if (!isConnected) return showToast('系統未連線', 'error');
        if (selectedIds.size === 0) return;
        if (!confirm(`確定要刪除選取的 ${selectedIds.size} 筆物料嗎？此動作無法復原。`)) return;
        const updates = {};
        selectedIds.forEach(id => { updates[`vehicle_materials/${id}`] = null; });
        db.ref().update(updates).then(() => {
          showToast(`已刪除 ${selectedIds.size} 筆物料`, 'success');
          setSelectedIds(new Set());
        });
      };

      const handleAddMaterial = (e) => {
        e.preventDefault();
        if (!isConnected) return showToast('系統未連線', 'error');
        if(!formData.part_number) return showToast('UPG為必填', 'error');
        
        const parsedTags = formData.tags.split(',').map(t => t.trim()).filter(t => t).map(tagName => {
            const existing = MOCK_TAGS.find(mt => mt.name === tagName);
            return existing || { id: 'tag-'+Math.random().toString(36).substr(2,5), name: tagName, color: 'bg-[#f5f5f7] text-[#1d1d1f] border-none' };
        });

        const newRef = db.ref('vehicle_materials').push();
        newRef.set({
          id: newRef.key,
          section_id: section.id,
          part_number: formData.part_number,
          part_code: formData.part_code,
          part_name: formData.part_name,
          part_name_zh: formData.part_name_zh || '',
          usage_per_unit: Number(formData.usage_per_unit) || 1,
          supplier: formData.supplier,
          category: formData.category,
          location: formData.location || '',
          remark: formData.remark || '',
          spec_params: formData.spec_params || '',
          assembly_group: formData.assembly_group || '',
          image: formData.image || '',
          unit: 'PCS',
          tags: parsedTags
        }).then(() => {
          showToast('車型物料新增成功', 'success');
          setIsAddMaterialOpen(false);
          setFormData({ part_number: '', part_code: '', part_name: '', part_name_zh: '', usage_per_unit: '1', supplier: '', category: '', location: '', remark: '', tags: '', spec_params: '', assembly_group: '', image: '' });
        });
      };

      const handleEditMaterialClick = (mat) => {
        setEditFormData({ ...mat, tags: (mat.tags || []).map(t => t.name).join(', ') });
        setIsEditMaterialOpen(true);
      };

      const handleUpdateMaterial = (e) => {
        e.preventDefault();
        if (!isConnected) return showToast('系統未連線', 'error');
        if(!editFormData.part_number) return showToast('UPG為必填', 'error');
        
        const parsedTags = editFormData.tags.split(',').map(t => t.trim()).filter(t => t).map(tagName => {
            const existing = MOCK_TAGS.find(mt => mt.name === tagName);
            return existing || { id: 'tag-'+Math.random().toString(36).substr(2,5), name: tagName, color: 'bg-[#f5f5f7] text-[#1d1d1f] border-none' };
        });

        db.ref(`vehicle_materials/${editFormData.id}`).update({
          part_number: editFormData.part_number,
          part_code: editFormData.part_code,
          part_name: editFormData.part_name,
          part_name_zh: editFormData.part_name_zh || '',
          usage_per_unit: Number(editFormData.usage_per_unit) || 1,
          supplier: editFormData.supplier || '',
          category: editFormData.category || '',
          location: editFormData.location || '',
          remark: editFormData.remark || '',
          spec_params: editFormData.spec_params || '',
          assembly_group: editFormData.assembly_group || '',
          image: editFormData.image || '',
          tags: parsedTags
        }).then(() => {
          showToast('車型物料更新成功', 'success');
          setIsEditMaterialOpen(false);
        });
      };

      const executeDeleteMaterial = () => {
        if (!deleteConfirmId) return;
        db.ref(`vehicle_materials/${deleteConfirmId}`).remove().then(() => {
          showToast('車型物料已刪除', 'success');
          setDeleteConfirmId(null);
        });

        <div className="space-y-4 sm:space-y-6 max-w-[1600px] mx-auto flex flex-col h-[calc(100vh-3rem)] animate-in fade-in duration-300">

              <button onClick={onBack} className="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded-full bg-white border border-[#d2d2d7]/50 shadow-sm hover:bg-[#f5f5f7] transition-colors text-[#1d1d1f] shrink-0">
                <Icon name="ArrowLeft" className="w-4 h-4 sm:w-5 sm:h-5" />
              </button>
              <div>
                <h1 className="text-xl sm:text-2xl font-semibold tracking-tight text-[#1d1d1f] flex items-center line-clamp-1">
                  {model.name} / {section.name} 物料清單

                <div className="flex items-center gap-1.5 sm:gap-2 mt-1.5 sm:mt-2">
                  <Badge className="bg-[#1d1d1f]/5 text-[#1d1d1f] border-none">總數: {materials.length}</Badge>
