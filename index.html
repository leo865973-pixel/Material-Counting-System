<body class="bg-[#f5f5f7] text-[#1d1d1f] font-sans antialiased selection:bg-blue-200/50 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    // ============================================================================
    // Security & Utility Functions
    // ============================================================================
    const hashPassword = (password) => {
      return btoa(encodeURIComponent(password)).split('').reverse().join('') + '_sec';
    };

    // ============================================================================
    // Edge TTS (Text-to-Speech) Engine - Natural English
    // ============================================================================
    const playEdgeTTS = async (text, voice = 'en-US-AriaNeural') => {
      return new Promise((resolve) => {
        try {
          const ws = new WebSocket('wss://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1?TrustedClientToken=6A5AA1D4EAFF4E9FB37E23D68491D6F4');
          let audioChunks = [];

          ws.onopen = () => {
            const configMsg = `X-Timestamp:${new Date().toISOString()}\r\nContent-Type:application/json; charset=utf-8\r\nPath:speech.config\r\n\r\n{"context":{"synthesis":{"audio":{"metadataoptions":{"sentenceBoundaryEnabled":false,"wordBoundaryEnabled":false},"outputFormat":"audio-24khz-48kbitrate-mono-mp3"}}}}`;
            ws.send(configMsg);

            const requestId = Math.random().toString(36).substring(2, 15);
            const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='en-US'><voice name='${voice}'><prosody pitch='+0Hz' rate='0%' volume='+0%'>${text}</prosody></voice></speak>`;
            const ssmlMsg = `X-RequestId:${requestId}\r\nContent-Type:application/ssml+xml\r\nX-Timestamp:${new Date().toISOString()}\r\nPath:ssml\r\n\r\n${ssml}`;
            ws.send(ssmlMsg);
          };

          ws.onmessage = async (e) => {
            if (e.data instanceof Blob) {
              const arrayBuffer = await e.data.arrayBuffer();
              const view = new DataView(arrayBuffer);
              const headerLength = view.getUint16(0);
              audioChunks.push(arrayBuffer.slice(2 + headerLength));
            } else if (typeof e.data === 'string' && e.data.includes('Path:turn.end')) {
              ws.close();
              const blob = new Blob(audioChunks, { type: 'audio/mp3' });
              const audio = new Audio(URL.createObjectURL(blob));
              audio.play().then(() => {
                audio.onended = resolve;
              }).catch(err => {
                console.error("Audio play error:", err);
                resolve();
              });
            }
          };
          
          ws.onerror = (err) => {
            console.error("TTS Error:", err);
            resolve();
          };
        } catch (err) {
          console.error("TTS Exception:", err);
          resolve();
        }
      });
    };

    // ============================================================================
    // Firebase Setup
    // ============================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyCEQ_UqWbALGnNiwDfWKUBm-nPjIGCSGfc",
      authDomain: "material-counting-system.firebaseapp.com",
      databaseURL: "https://material-counting-system-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "material-counting-system",
      storageBucket: "material-counting-system.firebasestorage.app",
      messagingSenderId: "561524776584",
      appId: "1:561524776584:web:753a9847a5c352e785493d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ============================================================================
    // Mock Data
    // ============================================================================
    const MOCK_USERS = [
      { id: 'u1', name: '王大明', email: 'admin@inv.sys', role: 'admin', avatar: '王', password: hashPassword('admin123') },
      { id: 'u2', name: '李經理', email: 'leader@inv.sys', role: 'leader', avatar: '李', password: hashPassword('123456') },
      { id: 'u3', name: '陳專員', email: 'op@inv.sys', role: 'operator', avatar: '陳', password: hashPassword('654321') }
    ];

    const MOCK_TAGS = [
      { id: 't1', name: '緊急件', color: 'bg-[#ff3b30]/10 text-[#ff3b30] border-[#ff3b30]/20' },
      { id: 't2', name: '新件', color: 'bg-[#0066cc]/10 text-[#0066cc] border-[#0066cc]/20' },
      { id: 't3', name: '客供件', color: 'bg-[#af52de]/10 text-[#af52de] border-[#af52de]/20' },
      { id: 't4', name: '沿用件', color: 'bg-[#86868b]/10 text-[#86868b] border-[#86868b]/20' }
    ];

    const MOCK_TASKS = [
      { id: 'tsk-001', title: 'EV馬達A型 試裝物料清點', type: 'trial', description: '新世代電動車馬達試作，確認BOM表物料到貨狀況', status: 'in_progress', due_date: '2024-05-20', created_at: '2024-05-10', progress: 45, owner_id: 'u1', allowed_users: ['u1', 'u2', 'u3'] },
      { id: 'tsk-002', title: '5月第一週 倉庫盤點', type: 'warehouse', description: '針對 A01~A05 架位進行例行性盤點', status: 'pending', due_date: '2024-05-15', created_at: '2024-05-12', progress: 0, owner_id: 'u1', allowed_users: ['u1', 'u2'] },
      { id: 'tsk-003', title: '線邊倉緊急備料確認', type: 'line_side', description: 'B產線臨時換線，確認特殊零組件', status: 'completed', due_date: '2024-05-01', created_at: '2024-05-01', progress: 100, owner_id: 'u1', allowed_users: ['u1', 'u3'] }
    ];

    const MOCK_MATERIALS = [
      { id: 'mat-001', task_id: 'tsk-001', part_number: 'MOT-A-0012', part_code: 'PT-001', part_name: '定子鐵芯總成', part_name_zh: '定子铁芯总成', unit: 'PCS', usage_per_unit: 1, target_qty: 5, counted_qty: 0, supplier: '供應商A', category: '電機', location: 'A01-01', remark: '', status: 'pending', tags: [MOCK_TAGS[0], MOCK_TAGS[1]] },
      { id: 'mat-002', task_id: 'tsk-001', part_number: 'BRG-6205-2Z', part_code: 'PT-002', part_name: '深溝玉軸承', part_name_zh: '深沟球轴承', unit: 'PCS', usage_per_unit: 2, target_qty: 10, counted_qty: 10, supplier: '供應商B', category: '機構件', location: 'A01-02', remark: '', status: 'arrived', tags: [MOCK_TAGS[3]] },
      { id: 'mat-003', task_id: 'tsk-001', part_number: 'CBL-HV-005', part_code: 'PT-003', part_name: '高壓線束', part_name_zh: '高压线束', unit: 'M', usage_per_unit: 5, target_qty: 25, counted_qty: 12, supplier: '供應商C', category: '線束', location: 'B02-01', remark: '線材長度需特別確認', status: 'partial', tags: [MOCK_TAGS[2]] },
      { id: 'mat-004', task_id: 'tsk-002', part_number: 'SCR-M6X20', part_code: 'PT-004', part_name: '六角法蘭螺栓', part_name_zh: '六角法兰螺栓', unit: 'PCS', usage_per_unit: 20, target_qty: 500, counted_qty: 0, supplier: '五金行', category: '緊固件', location: 'C05-03', remark: '', status: 'pending', tags: [] }
    ];

    // ============================================================================
    // Icon Component
    // ============================================================================
    const Icon = ({ name, className = '' }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide && window.lucide.icons[name]) {
          ref.current.innerHTML = '';
          const iconNode = window.lucide.createElement(window.lucide.icons[name]);
          iconNode.setAttribute('class', 'w-full h-full');
          iconNode.setAttribute('stroke-width', '1.5'); 
          ref.current.appendChild(iconNode);
        }
      }, [name]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
    };

    // ============================================================================
    // UI Components
    // ============================================================================
    const Badge = ({ children, className = '' }) => (
      <span className={`px-2.5 py-0.5 rounded-full text-[11px] font-semibold tracking-wide uppercase border ${className}`}>
        {children}
      </span>
    );

    const Button = ({ children, variant = 'primary', size = 'default', className = '', disabled, isLoading, ...props }) => {
      const baseStyle = "inline-flex items-center justify-center rounded-full font-medium transition-all duration-300 ease-out focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#0066cc]/50 disabled:pointer-events-none disabled:opacity-50 cursor-pointer relative active:scale-[0.97]";
      const variants = {
        primary: "bg-[#1d1d1f] text-white hover:bg-[#424245] shadow-[0_4px_14px_rgba(0,0,0,0.1)]",
        secondary: "bg-white text-[#1d1d1f] hover:bg-[#f5f5f7] border border-[#d2d2d7] shadow-sm",
        outline: "border border-[#d2d2d7] bg-transparent hover:bg-[#f5f5f7] text-[#1d1d1f]",
        ghost: "hover:bg-[#f5f5f7] text-[#86868b] hover:text-[#1d1d1f]",
        danger: "bg-[#ff3b30] text-white hover:bg-[#d70015] shadow-[0_4px_14px_rgba(255,59,48,0.2)]",
        success: "bg-[#34c759] text-white hover:bg-[#248a3d] shadow-[0_4px_14px_rgba(52,199,89,0.2)]"
      };
      const sizes = {
        default: "h-10 px-4 sm:px-5 text-sm",
        sm: "h-8 px-3 sm:px-4 text-xs",
        lg: "h-12 px-6 sm:px-8 text-base"
      };
      return (
        <button disabled={disabled || isLoading} className={`${baseStyle} ${variants[variant]} ${sizes[size]} ${className}`} {...props}>
          {isLoading ? <Icon name="Loader2" className="w-4 h-4 mr-2 animate-spin" /> : null}
          {children}
        </button>
      );
    };

    const Input = ({ className = '', ...props }) => (
      <input 
        className={`flex h-11 w-full rounded-xl border border-[#d2d2d7] bg-white/50 px-4 py-2 text-sm text-[#1d1d1f] shadow-sm transition-all duration-300 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-[#0066cc]/10 focus-visible:border-[#0066cc] disabled:cursor-not-allowed disabled:opacity-50 backdrop-blur-md placeholder:text-[#86868b] ${className}`}
        {...props}
      />
    );

    const Card = ({ children, className = '' }) => (
      <div className={`rounded-2xl sm:rounded-3xl border border-[#d2d2d7]/50 bg-white/80 backdrop-blur-2xl text-[#1d1d1f] shadow-[0_8px_30px_rgb(0,0,0,0.04)] flex flex-col transition-all duration-300 ${className}`}>
        {children}
      </div>
    );

    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-[#1d1d1f]/20 backdrop-blur-sm p-4 transition-all duration-300">
          <div className="bg-white/90 backdrop-blur-3xl border border-[#d2d2d7]/50 rounded-[2rem] shadow-[0_20px_40px_rgba(0,0,0,0.1)] w-full max-w-md flex flex-col max-h-[90vh] overflow-hidden animate-in fade-in zoom-in-95 duration-200">
            <div className="flex items-center justify-between p-5 sm:p-6 border-b border-[#d2d2d7]/30 shrink-0">
              <h2 className="text-lg sm:text-xl font-semibold tracking-tight text-[#1d1d1f]">{title}</h2>
              <button onClick={onClose} className="text-[#86868b] hover:text-[#1d1d1f] transition-colors bg-[#f5f5f7] hover:bg-[#e5e5ea] p-2 rounded-full"><Icon name="X" className="w-5 h-5"/></button>
            </div>
            <div className="p-5 sm:p-6 overflow-y-auto">
              {children}
            </div>
          </div>
        </div>
      );
    };

    // ============================================================================
    // Notification Toast System
    // ============================================================================
    let toastListener = null;
    const showToast = (message, type = 'info') => {
      if (toastListener) toastListener(message, type);
    };

    const ToastContainer = () => {
      const [toasts, setToasts] = useState([]);

      useEffect(() => {
        toastListener = (message, type) => {
          const id = Date.now() + Math.random();
          setToasts(prev => [...prev, { id, message, type }]);
          setTimeout(() => {
            setToasts(prev => prev.filter(t => t.id !== id));
          }, 3000);
        };
        return () => { toastListener = null; };
      }, []);

      return (
        <div className="fixed top-4 right-4 left-4 sm:left-auto sm:top-6 sm:right-6 z-[100] flex flex-col gap-3 pointer-events-none">
          {toasts.map(t => (
            <div key={t.id} className={`flex items-center px-4 sm:px-5 py-3 sm:py-3.5 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] text-white transform transition-all duration-300 animate-in slide-in-from-top-5 fade-in backdrop-blur-xl border border-white/10 ${t.type === 'success' ? 'bg-[#34c759]/90' : t.type === 'error' ? 'bg-[#ff3b30]/90' : 'bg-[#1d1d1f]/90'}`}>
              <Icon name={t.type === 'success' ? 'CheckCircle2' : t.type === 'error' ? 'X' : 'Info'} className="w-5 h-5 mr-3 opacity-90 shrink-0" />
              <span className="font-medium tracking-wide text-sm">{t.message}</span>
            </div>
          ))}
        </div>
      );
    };

    // ============================================================================
    // Login Screen
    // ============================================================================
    const LoginScreen = ({ onLogin, adminPassword, users }) => {
      const [password, setPassword] = useState('');
      const [mode, setMode] = useState('normal');

      const handleLogin = (e) => {
        e.preventDefault();
        if (mode === 'normal') {
          const hashedInput = hashPassword(password);
          const matchedUser = users.find(u => u.password === hashedInput);
          if (matchedUser) {
            onLogin('normal', matchedUser);
            showToast(`歡迎回來，${matchedUser.name}`, 'success');
          } else {
            showToast('密碼錯誤，請重新輸入', 'error');
          }
        } else {
          if (password === adminPassword) {
            onLogin('admin');
            showToast('已進入後台管理', 'success');
          } else {
            showToast('管理員密碼錯誤', 'error');
          }
        }
      };

      return (
        <div className="flex h-screen items-center justify-center bg-[#f5f5f7] relative overflow-hidden px-4">
          <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-400/10 rounded-full blur-[120px] pointer-events-none"></div>
          <div className="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-purple-400/10 rounded-full blur-[120px] pointer-events-none"></div>
          
          <div className="w-full max-w-[420px] p-8 sm:p-10 bg-white/60 backdrop-blur-3xl border border-white/40 rounded-[2.5rem] shadow-[0_8px_40px_rgb(0,0,0,0.04)] relative z-10">
            <div className="flex flex-col items-center mb-8 sm:mb-10">
              <h1 className="text-2xl sm:text-3xl font-semibold tracking-tight text-[#1d1d1f]">物料盤點系統</h1>
              <p className="text-[#86868b] mt-2 text-xs sm:text-sm font-medium tracking-wide">
                {mode === 'admin' ? '後台管理登入' : '智慧物料清點平台'}
              </p>
            </div>
            <form onSubmit={handleLogin} className="space-y-5 sm:space-y-6">
              <div>
                <Input 
                  type="password" 
                  placeholder={mode === 'admin' ? "請輸入管理者密碼" : "請輸入個人登入密碼"} 
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  className="h-12 sm:h-14 text-center tracking-[0.2em] text-base sm:text-lg rounded-2xl bg-white/80"
                  autoFocus
                />
              </div>
              <Button type="submit" size="lg" className={`w-full h-12 sm:h-14 text-sm sm:text-base rounded-2xl ${mode === 'admin' ? 'bg-[#1d1d1f] hover:bg-[#424245]' : 'bg-[#0066cc] hover:bg-[#005bb5]'}`}>
                {mode === 'admin' ? '進入後台' : '登入系統'}
              </Button>
            </form>
            
            <div className="mt-6 sm:mt-8 pt-5 sm:pt-6 border-t border-[#d2d2d7]/30 text-center">
              <button 
                type="button" 
                onClick={() => { setMode(mode === 'normal' ? 'admin' : 'normal'); setPassword(''); }} 
                className="text-[#86868b] hover:text-[#1d1d1f] text-xs sm:text-sm font-medium transition-colors flex items-center justify-center w-full"
              >
                {mode === 'normal' ? <><Icon name="Shield" className="w-4 h-4 mr-1.5"/> 進入後台管理系統</> : <><Icon name="ArrowLeft" className="w-4 h-4 mr-1.5"/> 返回一般登入</>}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================================
    // Audit Log Modal Component
    // ============================================================================
    const AuditLogModal = ({ isOpen, onClose, logs }) => {
      const [searchTerm, setSearchTerm] = useState('');
      const [filterAction, setFilterAction] = useState('ALL');

      if (!isOpen) return null;

      const filteredLogs = logs.filter(log => {
         const matchAction = filterAction === 'ALL' || log.action === filterAction;
         const searchLower = searchTerm.toLowerCase();
         const matchSearch = (log.entity_name || '').toLowerCase().includes(searchLower) ||
                             (log.user_name || '').toLowerCase().includes(searchLower) ||
                             (log.changes || []).some(c => c.field.toLowerCase().includes(searchLower) || String(c.old).toLowerCase().includes(searchLower) || String(c.new).toLowerCase().includes(searchLower));
         return matchAction && matchSearch;
      });

      const formatDateTime = (isoString) => {
          if(!isoString) return '';
          const d = new Date(isoString);
          return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      };

      const getActionColor = (action) => {
          if(action === 'CREATE') return 'bg-[#34c759]';
          if(action === 'UPDATE') return 'bg-[#0066cc]';
          if(action === 'DELETE') return 'bg-[#ff3b30]';
          return 'bg-[#86868b]';
      };

      return (
        <div className="fixed inset-0 z-[70] flex items-center justify-center bg-[#1d1d1f]/20 backdrop-blur-sm p-4 transition-all duration-300">
          <div className="bg-white/90 backdrop-blur-3xl border border-[#d2d2d7]/50 rounded-[2rem] shadow-[0_20px_40px_rgba(0,0,0,0.1)] w-full max-w-2xl flex flex-col max-h-[85vh] overflow-hidden animate-in fade-in zoom-in-95 duration-200">
            <div className="flex items-center justify-between p-5 sm:p-6 border-b border-[#d2d2d7]/30 shrink-0">
              <h2 className="text-lg sm:text-xl font-semibold tracking-tight text-[#1d1d1f] flex items-center"><Icon name="History" className="w-5 h-5 mr-2 text-[#86868b]"/> 操作紀錄</h2>
              <button onClick={onClose} className="text-[#86868b] hover:text-[#1d1d1f] transition-colors bg-[#f5f5f7] hover:bg-[#e5e5ea] p-2 rounded-full"><Icon name="X" className="w-5 h-5"/></button>
            </div>
            
            <div className="p-4 sm:p-6 border-b border-[#d2d2d7]/30 bg-[#f5f5f7]/50 flex flex-col sm:flex-row gap-3 shrink-0">
               <div className="relative flex-1">
                  <Icon name="Search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-[#86868b]" />
                  <Input placeholder="搜尋人員、物料、修改內容..." className="pl-9 bg-white h-10" value={searchTerm} onChange={e => setSearchTerm(e.target.value)}/>
               </div>
               <select className="h-10 rounded-xl border border-[#d2d2d7] bg-white px-3 text-sm text-[#1d1d1f] shadow-sm outline-none focus:ring-2 focus:ring-[#0066cc]/50" value={filterAction} onChange={e => setFilterAction(e.target.value)}>
                  <option value="ALL">所有操作</option>
                  <option value="CREATE">新增</option>
                  <option value="UPDATE">編輯</option>
                  <option value="DELETE">刪除</option>
               </select>
            </div>

            <div className="p-4 sm:p-6 overflow-y-auto flex-1 bg-white/30">
               {filteredLogs.length > 0 ? (
                  <div className="relative pl-6 border-l-2 border-[#d2d2d7]/40 space-y-8 py-2">
                     {filteredLogs.map((log, idx) => (
                        <div key={log.id || idx} className="relative">
                           <div className={`absolute -left-[29px] top-1 w-3.5 h-3.5 rounded-full ${getActionColor(log.action)} ring-4 ring-white shadow-sm`}></div>
                           <div className="flex flex-wrap items-center gap-2 text-xs text-[#86868b] mb-1.5 font-medium">
                              <span className="text-[#1d1d1f] font-bold bg-[#f5f5f7] px-2 py-0.5 rounded-md border border-[#d2d2d7]/50">{log.user_name}</span>
                              <span>{formatDateTime(log.timestamp)}</span>
                           </div>
                           <div className="bg-white p-4 rounded-2xl border border-[#d2d2d7]/50 shadow-sm hover:shadow-md transition-shadow">
                              <div className="font-semibold text-sm text-[#1d1d1f] mb-3 flex items-center">
                                 <span className={`text-[10px] px-2 py-0.5 rounded uppercase tracking-wider font-bold mr-2 text-white ${getActionColor(log.action)}`}>{log.action_label}</span>
                                 {log.entity_name}
                              </div>
                              {log.changes && log.changes.length > 0 && (
                                 <div className="space-y-2 bg-[#f5f5f7]/50 p-3 rounded-xl border border-[#d2d2d7]/30">
                                    {log.changes.map((c, i) => (
                                       <div key={i} className="text-xs flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-2">
                                          <span className="font-bold text-[#86868b] w-20 shrink-0">{c.field}</span>
                                          <div className="flex items-center flex-1 flex-wrap gap-1.5">
                                             {log.action !== 'CREATE' && (
                                                <span className="bg-[#ff3b30]/10 text-[#ff3b30] px-1.5 py-0.5 rounded line-through max-w-[150px] truncate" title={c.old}>{c.old || '(空)'}</span>
                                             )}
                                             {log.action === 'UPDATE' && <Icon name="ArrowRight" className="w-3 h-3 text-[#86868b] shrink-0"/>}
                                             {log.action !== 'DELETE' && (
                                                <span className="bg-[#34c759]/10 text-[#34c759] px-1.5 py-0.5 rounded font-medium max-w-[150px] truncate" title={c.new}>{c.new || '(空)'}</span>
                                             )}
                                          </div>
                                       </div>
                                    ))}
                                 </div>
                              )}
                           </div>
                        </div>
                     ))}
                  </div>
               ) : (
                  <div className="flex flex-col items-center justify-center h-40 text-[#86868b]">
                     <Icon name="Inbox" className="w-10 h-10 mb-2 opacity-50" />
                     <p className="text-sm font-medium">沒有符合的操作紀錄</p>
                  </div>
               )}
            </div>
          </div>
        </div>
      );
    };

    // ============================================================================
    // Task Access Management Modal
    // ============================================================================
    const TaskAccessModal = ({ isOpen, onClose, task, users, currentUser, isConnected }) => {
      const [selectedUsers, setSelectedUsers] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');

      useEffect(() => {
        if (task) {
          setSelectedUsers(task.allowed_users || []);
        }
      }, [task]);

      if (!isOpen || !task) return null;

      const handleToggleUser = (userId) => {
        if (selectedUsers.includes(userId)) {
          setSelectedUsers(selectedUsers.filter(id => id !== userId));
        } else {
          setSelectedUsers([...selectedUsers, userId]);
        }
      };

      const handleSave = () => {
        if (!isConnected) return showToast('系統未連線，無法儲存', 'error');
        db.ref(`tasks/${task.id}`).update({ allowed_users: selectedUsers }).then(() => {
          showToast('權限更新成功', 'success');
          onClose();
        });
      };

      const filteredUsers = users.filter(u => u.name.includes(searchTerm) || u.email.includes(searchTerm));

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="專案權限管理">
          <div className="space-y-4 sm:space-y-5">
            <Input placeholder="搜尋使用者..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
            <div className="max-h-60 overflow-y-auto space-y-2 pr-2">
              {filteredUsers.map(u => {
                const isOwner = u.id === task.owner_id;
                const isForced = isOwner;
                const isChecked = isForced || selectedUsers.includes(u.id);

                return (
                  <label key={u.id} className={`flex items-center p-3 rounded-xl border ${isChecked ? 'border-[#0066cc] bg-[#0066cc]/5' : 'border-[#d2d2d7]/50 bg-white'} cursor-pointer transition-colors`}>
                    <input type="checkbox" className="hidden" checked={isChecked} disabled={isForced} onChange={() => handleToggleUser(u.id)} />
                    <div className={`w-5 h-5 rounded flex items-center justify-center mr-3 shrink-0 ${isChecked ? 'bg-[#0066cc] border-none' : 'border border-[#d2d2d7]'}`}>
                      {isChecked && <Icon name="Check" className="w-3 h-3 text-white" />}
                    </div>
                    <div className="flex-1 truncate pr-2">
                      <div className="font-semibold text-sm text-[#1d1d1f] truncate">{u.name}</div>
                      <div className="text-xs text-[#86868b] truncate">{u.email}</div>
                    </div>
                    <div className="shrink-0">
                      {isOwner ? <Badge className="bg-[#0066cc]/10 text-[#0066cc] border-none">OWNER</Badge> :
                       isChecked ? <Badge className="bg-[#34c759]/10 text-[#34c759] border-none">{u.role === 'admin' ? 'ADMIN' : 'MEMBER'}</Badge> : null}
                    </div>
                  </label>
                );
              })}
            </div>
            <div className="pt-4 sm:pt-6 flex justify-end space-x-3">
              <Button variant="secondary" onClick={onClose}>取消</Button>
              <Button onClick={handleSave}>儲存設定</Button>
            </div>
          </div>
        </Modal>
      );
    };

    // ============================================================================
    // Excel Manager Modal (任務管理用)
    // ============================================================================
    const ExcelManagerModal = ({ isOpen, onClose, task, materials, onImportSuccess }) => {
      const [activeTab, setActiveTab] = useState('import');
      const [isProcessing, setIsProcessing] = useState(false);
      const [importPreview, setImportPreview] = useState([]);
      const [importErrors, setImportErrors] = useState([]);
      const fileInputRef = useRef(null);

      if (!isOpen) return null;

      const loadXLSX = () => {
        if (window.XLSX) return window.XLSX;
        showToast("Excel 模組尚未載入完成", "error");
        return null;
      };

      const handleDownloadTemplate = () => {
        const XLSX = loadXLSX();
        if (!XLSX) return;
        const templateData = [{ 
          "UPG": "MOT-A-0012", 
          "件號": "PT-001",
          "件名": "定子鐵芯總成", 
          "中文件名": "定子铁芯总成",
          "單位": "PCS", 
          "單台用量": 1,
          "目標數量": 100, 
          "廠商": "供應商A", 
          "零件分類": "電機",
          "儲位": "A01-01",
          "標籤": "緊急件,新件",
          "備註": "" 
        }];
        const ws = XLSX.utils.json_to_sheet(templateData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "匯入範本");
        XLSX.writeFile(wb, "匯入範本.xlsx");
      };

      const handleExport = () => {
        const XLSX = loadXLSX();
        if (!XLSX) return;
        const exportData = materials.map(m => ({
          "UPG": m.part_number, 
          "件號": m.part_code || '',
          "件名": m.part_name, 
          "中文件名": m.part_name_zh || '',
          "單位": m.unit,
          "單台用量": m.usage_per_unit || 1,
          "目標數量": m.target_qty, 
          "已清點數量": m.counted_qty, 
          "差異數量": m.counted_qty - m.target_qty,
          "狀態": m.counted_qty >= m.target_qty ? '已完成' : (m.counted_qty > 0 ? '清點中' : '未清點'),
          "廠商": m.supplier || '', 
          "零件分類": m.category || '',
          "儲位": m.location || '',
          "標籤": (m.tags || []).map(t => t.name).join(','),
          "備註": m.remark || ''
        }));
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "清點結果");
        XLSX.writeFile(wb, `[${task.title}]_結果.xlsx`);
        showToast("匯出成功", "success");
      };

      const handleFileUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        setIsProcessing(true);
        const XLSX = loadXLSX();
        if (!XLSX) return setIsProcessing(false);

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const wb = XLSX.read(evt.target?.result, { type: 'binary' });
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            const errors = [];
            const previewData = [];

            data.forEach((row, i) => {
              const rowNum = i + 2;
              const rowErrs = [];
              const partNo = String(row['UPG'] || '').trim();
              const targetQty = Number(row['目標數量']);

              if (!partNo) rowErrs.push("缺UPG");
              if (isNaN(targetQty) || targetQty < 0) rowErrs.push("目標數量錯誤");
              if (partNo && materials.some(m => m.part_number === partNo)) rowErrs.push("系統已存在");

              if (rowErrs.length > 0) errors.push({ row: rowNum, errors: rowErrs });
              previewData.push({ ...row, _rowNum: rowNum, _errors: rowErrs });
            });

            setImportErrors(errors);
            setImportPreview(previewData);
          } catch (error) {
            showToast("解析失敗", "error");
          } finally {
            setIsProcessing(false);
            if (fileInputRef.current) fileInputRef.current.value = '';
          }
        };
        reader.readAsBinaryString(file);
      };

      const confirmImport = () => {
        const newMaterials = importPreview
          .filter(row => row._errors.length === 0)
          .map(row => {
            const newRef = db.ref('materials').push();
            const tagsStr = String(row['標籤'] || '');
            const parsedTags = tagsStr.split(',').map(t => t.trim()).filter(t => t).map(tagName => {
                const existing = MOCK_TAGS.find(mt => mt.name === tagName);
                return existing || { id: 'tag-'+Math.random().toString(36).substr(2,5), name: tagName, color: 'bg-[#f5f5f7] text-[#1d1d1f] border-[#d2d2d7]' };
            });

            return {
              id: newRef.key,
              task_id: task.id,
              part_number: String(row['UPG']).trim(),
              part_code: String(row['件號'] || '').trim(),
              part_name: String(row['件名'] || ''),
              part_name_zh: String(row['中文件名'] || ''),
              unit: String(row['單位'] || 'PCS'),
              usage_per_unit: Number(row['單台用量']) || 1,
              target_qty: Number(row['目標數量']),
              counted_qty: 0,
              supplier: String(row['廠商'] || row['供應商'] || ''),
              category: String(row['零件分類'] || ''),
              location: String(row['儲位'] || ''),
              remark: String(row['備註'] || ''),
              status: 'pending',
              tags: parsedTags
            };
          });
        if (newMaterials.length > 0) {
          onImportSuccess(newMaterials);
          onClose();
        }
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-[#1d1d1f]/20 backdrop-blur-sm p-4 transition-all duration-300">
          <div className="bg-white/90 backdrop-blur-3xl border border-[#d2d2d7]/50 rounded-[2rem] shadow-[0_20px_40px_rgba(0,0,0,0.1)] w-full max-w-2xl flex flex-col max-h-[85vh] overflow-hidden animate-in fade-in zoom-in-95 duration-200">
            <div className="flex items-center justify-between p-5 sm:p-6 border-b border-[#d2d2d7]/30 shrink-0">
              <h2 className="text-lg sm:text-xl font-semibold tracking-tight text-[#1d1d1f] flex items-center"><Icon name="FileSpreadsheet" className="w-5 h-5 mr-2 text-[#34c759]"/> 批次作業</h2>
              <button onClick={onClose} className="text-[#86868b] hover:text-[#1d1d1f] transition-colors bg-[#f5f5f7] hover:bg-[#e5e5ea] p-2 rounded-full"><Icon name="X" className="w-5 h-5"/></button>
            </div>
            <div className="flex p-2 bg-[#f5f5f7] m-4 sm:m-6 rounded-xl shrink-0">
              <button className={`flex-1 py-2 text-sm font-medium rounded-lg transition-all ${activeTab === 'import' ? 'bg-white text-[#1d1d1f] shadow-sm' : 'text-[#86868b] hover:text-[#1d1d1f]'}`} onClick={() => setActiveTab('import')}>匯入資料</button>
              <button className={`flex-1 py-2 text-sm font-medium rounded-lg transition-all ${activeTab === 'export' ? 'bg-white text-[#1d1d1f] shadow-sm' : 'text-[#86868b] hover:text-[#1d1d1f]'}`} onClick={() => setActiveTab('export')}>匯出報表</button>
            </div>
            <div className="px-4 sm:px-6 pb-6 overflow-auto flex-1">
              {activeTab === 'import' ? (
                <div className="space-y-4">
                  <div className="flex flex-col sm:flex-row justify-between bg-white p-4 sm:p-5 rounded-2xl border border-[#d2d2d7]/50 items-start sm:items-center shadow-sm gap-3 sm:gap-0">
                    <span className="text-sm text-[#1d1d1f] font-medium">1. 下載標準格式範本</span>
                    <Button variant="secondary" size="sm" onClick={handleDownloadTemplate} className="w-full sm:w-auto">下載範本</Button>
                  </div>
                  <div className="flex flex-col sm:flex-row justify-between bg-white p-4 sm:p-5 rounded-2xl border border-[#d2d2d7]/50 items-start sm:items-center shadow-sm gap-3 sm:gap-0">
                    <span className="text-sm text-[#1d1d1f] font-medium">2. 上傳填寫好的資料</span>
                    <input type="file" accept=".xlsx" className="hidden" ref={fileInputRef} onChange={handleFileUpload} />
                    <Button onClick={() => fileInputRef.current?.click()} isLoading={isProcessing} className="w-full sm:w-auto"><Icon name="Upload" className="w-4 h-4 mr-2"/>上傳檔案</Button>
                  </div>
                  {importPreview.length > 0 && (
                    <div className="mt-6 border border-[#d2d2d7]/50 rounded-2xl overflow-hidden text-sm bg-white shadow-sm">
                       <div className="bg-[#f5f5f7] p-4 flex justify-between font-medium border-b border-[#d2d2d7]/50">
                         <span className="text-[#34c759]">✅ 成功: {importPreview.length - importErrors.length}</span>
                         <span className="text-[#ff3b30]">❌ 失敗: {importErrors.length}</span>
                       </div>
                       <div className="max-h-64 overflow-auto">
                          {importPreview.map((row, i) => (
                            <div key={i} className={`p-3 border-b border-[#f5f5f7] ${row._errors.length > 0 ? 'bg-[#ff3b30]/5' : ''}`}>
                              <div className="flex items-center">
                                <div className="w-20 sm:w-24 text-[#86868b] font-mono text-xs truncate shrink-0 mr-2">第 {row._rowNum} 行</div>
                                <div className="w-24 sm:w-32 text-[#1d1d1f] font-medium truncate mr-2">{row['UPG'] || '(no UPG)'}</div>
                                <div className="flex-1 text-[#1d1d1f] truncate mr-2">{row['件名'] || ''}</div>
                                <div className="shrink-0">
                                   {row._errors.length > 0 ? <span className="text-[#ff3b30] text-xs font-semibold">✗ 有錯誤</span> : <span className="text-[#34c759] text-xs font-semibold">✓ 通過</span>}
                                </div>
                              </div>
                              {row._errors.length > 0 && (
                                <div className="mt-1.5 ml-0 flex flex-wrap gap-1">
                                  {row._errors.map((err, ei) => (
                                    <span key={ei} className="text-[10px] bg-[#ff3b30]/10 text-[#ff3b30] px-2 py-0.5 rounded font-medium">{err}</span>
                                  ))}
                                </div>
                              )}
                            </div>
                          ))}
                       </div>
                    </div>
                  )}
                </div>
              ) : (
                 <div className="text-center py-12 sm:py-16 space-y-6">
                    <div className="w-16 h-16 sm:w-20 sm:h-20 bg-[#0066cc]/10 rounded-full flex items-center justify-center mx-auto">
                      <Icon name="Download" className="w-8 h-8 sm:w-10 sm:h-10 text-[#0066cc]" />
                    </div>
                    <p className="text-[#86868b] font-medium text-sm sm:text-base">匯出包含進度與差異的完整報表</p>
                    <Button onClick={handleExport} size="lg" className="rounded-2xl w-full sm:w-auto"><Icon name="FileSpreadsheet" className="w-5 h-5 mr-2" /> 產生 Excel</Button>
                 </div>
              )}
            </div>
            {activeTab === 'import' && importPreview.length > 0 && (
              <div className="p-4 sm:p-6 border-t border-[#d2d2d7]/30 bg-[#f5f5f7]/50 flex justify-end shrink-0">
                <Button variant="primary" onClick={confirmImport} disabled={importPreview.length === importErrors.length} className="w-full sm:w-auto">確認匯入資料</Button>
              </div>
            )}
          </div>
        </div>
      );
    };
	
	// ============================================================================
    // Dashboard
    // ============================================================================
    const Dashboard = ({ tasks, materials }) => {
      const activeTaskIds = new Set(tasks.map(t => t.id));
      const activeMaterials = materials.filter(m => activeTaskIds.has(m.task_id));

      const totalTasks = tasks.length;
      const completedTasks = tasks.filter(t => t.status === 'completed').length;
      const inProgressTasks = tasks.filter(t => t.status === 'in_progress').length;
      
      const totalItems = activeMaterials.length;
      const completedItems = activeMaterials.filter(m => m.counted_qty >= m.target_qty).length;
      const totalCompletionRate = totalItems === 0 ? 0 : Math.round((completedItems / totalItems) * 100);

      const shortMaterials = activeMaterials.filter(m => m.counted_qty > 0 && m.counted_qty < m.target_qty);

      return (
        <div className="space-y-6 sm:space-y-8 max-w-7xl mx-auto pb-12 animate-in fade-in duration-500">
          <div>
            <h1 className="text-2xl sm:text-3xl font-semibold tracking-tight text-[#1d1d1f]">營運總覽</h1>
            <p className="text-[#86868b] text-xs sm:text-sm mt-1.5 font-medium">即時掌握全廠區盤點與備料狀況</p>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
            <Card className="p-5 sm:p-6 hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)]">
              <div className="flex justify-between items-start">
                <div>
                  <p className="text-xs sm:text-sm font-semibold text-[#86868b] mb-2">活躍任務</p>
                  <h3 className="text-3xl sm:text-4xl font-light tracking-tighter text-[#1d1d1f]">{inProgressTasks} <span className="text-lg sm:text-xl font-medium text-[#d2d2d7]">/ {totalTasks}</span></h3>
                </div>
                <div className="p-2.5 sm:p-3 bg-[#0066cc]/10 rounded-2xl"><Icon name="ClipboardList" className="w-5 h-5 sm:w-6 sm:h-6 text-[#0066cc]"/></div>
              </div>
            </Card>
            
            <Card className="p-5 sm:p-6 hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)]">
              <div className="flex justify-between items-start">
                <div>
                  <p className="text-xs sm:text-sm font-semibold text-[#86868b] mb-2">整體完成率</p>
                  <h3 className="text-3xl sm:text-4xl font-light tracking-tighter text-[#34c759]">{totalCompletionRate}%</h3>
                </div>
                <div className="p-2.5 sm:p-3 bg-[#34c759]/10 rounded-2xl"><Icon name="CheckCircle2" className="w-5 h-5 sm:w-6 sm:h-6 text-[#34c759]"/></div>
              </div>
              <div className="mt-4 sm:mt-5 h-1.5 w-full bg-[#f5f5f7] rounded-full overflow-hidden">
                <div className="h-full bg-[#34c759] rounded-full transition-all duration-1000 ease-out" style={{ width: `${totalCompletionRate}%`}}></div>
              </div>
            </Card>

            <Card className="p-5 sm:p-6 border-[#ff3b30]/20 bg-[#ff3b30]/[0.02] hover:shadow-[0_8px_30px_rgba(255,59,48,0.08)]">
              <div className="flex justify-between items-start">
                <div>
                  <p className="text-xs sm:text-sm font-semibold text-[#ff3b30]/80 mb-2">缺料警示</p>
                  <h3 className="text-3xl sm:text-4xl font-light tracking-tighter text-[#ff3b30]">{shortMaterials.length}</h3>
                </div>
                <div className="p-2.5 sm:p-3 bg-[#ff3b30]/10 rounded-2xl"><Icon name="AlertTriangle" className="w-5 h-5 sm:w-6 sm:h-6 text-[#ff3b30]"/></div>
              </div>
            </Card>

            <Card className="p-5 sm:p-6 hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)]">
              <div className="flex justify-between items-start">
                <div>
                  <p className="text-xs sm:text-sm font-semibold text-[#86868b] mb-2">總管理物料</p>
                  <h3 className="text-3xl sm:text-4xl font-light tracking-tighter text-[#1d1d1f]">{activeMaterials.length}</h3>
                </div>
                <div className="p-2.5 sm:p-3 bg-[#af52de]/10 rounded-2xl"><Icon name="Package" className="w-5 h-5 sm:w-6 sm:h-6 text-[#af52de]"/></div>
              </div>
            </Card>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
            <Card className="lg:col-span-2 p-6 sm:p-8">
              <h3 className="text-base sm:text-lg font-semibold tracking-tight mb-5 sm:mb-6 flex items-center text-[#1d1d1f]"><Icon name="Activity" className="w-5 h-5 mr-2 text-[#86868b]"/> 進行中任務</h3>
              <div className="space-y-6 sm:space-y-8">
                {tasks.filter(t => t.status !== 'completed').map(task => {
                  const progress = task.progress || 0;
                  return (
                    <div key={task.id} className="space-y-2.5 sm:space-y-3">
                      <div className="flex justify-between text-xs sm:text-sm items-center">
                        <div className="flex items-center">
                          <span className="font-medium text-[#1d1d1f] truncate max-w-[150px] sm:max-w-none">{task.title}</span>
                          <span className="ml-2 inline-flex items-center text-[10px] font-semibold text-[#86868b] bg-[#f5f5f7] px-1.5 py-0.5 rounded-md border border-[#d2d2d7]/50 shrink-0">
                            {task.materialCount} 項
                          </span>
                        </div>
                        <span className="text-[#86868b] font-semibold">{progress}%</span>
                      </div>
                      <div className="h-1.5 w-full bg-[#f5f5f7] rounded-full overflow-hidden">
                        <div className={`h-full rounded-full transition-all duration-1000 ease-out ${progress === 100 ? 'bg-[#34c759]' : 'bg-[#1d1d1f]'}`} style={{ width: `${progress}%`}}></div>
                      </div>
                    </div>
                  );
                })}
                {tasks.filter(t => t.status !== 'completed').length === 0 && <p className="text-[#86868b] py-8 text-center font-medium text-sm">目前無進行中的任務</p>}
              </div>
            </Card>

            <Card className="flex flex-col h-[350px] sm:h-[420px] overflow-hidden">
              <div className="p-5 sm:p-6 border-b border-[#d2d2d7]/30 flex justify-between items-center bg-white/50 backdrop-blur-md shrink-0">
                <h3 className="text-sm sm:text-base font-semibold tracking-tight text-[#1d1d1f] flex items-center"><Icon name="AlertCircle" className="w-4 h-4 mr-2 text-[#ff3b30]"/> 異常追蹤</h3>
                <Badge className="bg-[#ff3b30]/10 text-[#ff3b30] border-none">{shortMaterials.length}</Badge>
              </div>
              <div className="p-0 overflow-auto flex-1 bg-[#f5f5f7]/30">
                {shortMaterials.length > 0 ? (
                  <div className="divide-y divide-[#d2d2d7]/30">
                    {shortMaterials.map(m => {
                      const parentTask = tasks.find(t => t.id === m.task_id);
                      return (
                        <div key={m.id} className="p-4 sm:p-5 hover:bg-white transition-colors duration-200">
                          <div className="flex justify-between items-start mb-1.5">
                            <div className="flex items-center truncate mr-2">
                              {m.part_code && <span className="font-bold text-[#1d1d1f] text-xs sm:text-sm mr-1.5">{m.part_code}</span>}
                              <span className="font-semibold text-[#1d1d1f] text-xs sm:text-sm truncate">{m.part_name}</span>
                            </div>
                            <span className="text-[#ff3b30] font-bold text-xs sm:text-sm bg-[#ff3b30]/10 px-2 py-0.5 rounded-md shrink-0">缺 {m.target_qty - m.counted_qty}</span>
                          </div>
                          <p className="text-[10px] sm:text-xs text-[#86868b] truncate mb-2 sm:mb-3 font-medium flex items-center">
                            <span className="mr-1.5 border border-[#d2d2d7] px-1.5 rounded text-[9px] sm:text-[10px]">ID</span>
                            {m.part_number}
                          </p>
                          <div className="flex justify-between items-center">
                            <span className="text-[9px] sm:text-[10px] bg-[#f5f5f7] px-2 py-1 rounded-md text-[#86868b] font-medium truncate max-w-[120px] sm:max-w-[140px] border border-[#d2d2d7]/50">{parentTask?.title}</span>
                            <span className="text-[10px] sm:text-[11px] text-[#86868b] font-medium truncate ml-2">{m.supplier || '-'}</span>
                          </div>
                        </div>
                      )
                    })}
                  </div>
                ) : (
                  <div className="flex flex-col items-center justify-center h-full text-[#86868b]">
                    <div className="w-12 h-12 sm:w-16 sm:h-16 bg-[#34c759]/10 rounded-full flex items-center justify-center mb-3 sm:mb-4">
                      <Icon name="Check" className="w-6 h-6 sm:w-8 sm:h-8 text-[#34c759]" />
                    </div>
                    <p className="text-xs sm:text-sm font-medium">目前沒有缺料狀況</p>
                  </div>
                )}
              </div>
            </Card>
          </div>
        </div>
      );
    }

    // ============================================================================
    // Settings / Users (Backend Management)
    // ============================================================================
    const SettingsView = ({ users, isConnected }) => {
      const [isAddUserOpen, setIsAddUserOpen] = useState(false);
      const [isEditUserOpen, setIsEditUserOpen] = useState(false);
      const [formData, setFormData] = useState({ name: '', email: '', role: 'operator', password: '' });
      const [editFormData, setEditFormData] = useState(null);
      const [newAdminPassword, setNewAdminPassword] = useState('');

      const handleAddUser = (e) => {
        e.preventDefault();
        if (!isConnected) return showToast('系統未連線，請檢查網路狀態', 'error');
        if(!formData.name || !formData.email || !formData.password) return showToast('請填寫完整資訊', 'error');
        
        const hashedPwd = hashPassword(formData.password);
        if (users.some(u => u.password === hashedPwd)) {
          return showToast('密碼已被使用，請更換其他密碼', 'error');
        }

        const newRef = db.ref('users').push();
        newRef.set({
          id: newRef.key,
          name: formData.name,
          email: formData.email,
          role: formData.role,
          password: hashedPwd,
          avatar: formData.name.charAt(0)
        }).then(() => {
          showToast('人員新增成功', 'success');
          setIsAddUserOpen(false);
          setFormData({ name: '', email: '', role: 'operator', password: '' });
        });
      };

      const handleEditUserClick = (u) => {
        setEditFormData({...u, newPassword: ''});
        setIsEditUserOpen(true);
      };

      const handleUpdateUser = (e) => {
        e.preventDefault();
        if (!isConnected) return showToast('系統未連線，請檢查網路狀態', 'error');
        if(!editFormData.name || !editFormData.email) return showToast('請填寫完整資訊', 'error');
        
        let finalPwd = editFormData.password;
        if (editFormData.newPassword) {
          finalPwd = hashPassword(editFormData.newPassword);
          if (users.some(u => u.id !== editFormData.id && u.password === finalPwd)) {
            return showToast('密碼已被使用，請更換其他密碼', 'error');
          }
        }

        db.ref(`users/${editFormData.id}`).update({
          name: editFormData.name,
          email: editFormData.email,
          role: editFormData.role,
          password: finalPwd,
          avatar: editFormData.name.charAt(0)
        }).then(() => {
          showToast('人員資料已更新', 'success');
          setIsEditUserOpen(false);
        });
      };

      const handleDeleteUser = (id) => {
        if (!isConnected) return showToast('系統未連線，請檢查網路狀態', 'error');
        if(confirm('確定要刪除此人員嗎？')) {
          db.ref(`users/${id}`).remove().then(() => showToast('人員已刪除', 'success'));
        }
      };

      const handleUpdateAdminPassword = (e) => {
        e.preventDefault();
        if (!isConnected) return showToast('系統未連線，請檢查網路狀態', 'error');
        if(!newAdminPassword) return showToast('請輸入新密碼', 'error');
        db.ref('adminPassword').set(newAdminPassword).then(() => {
          showToast('後台管理密碼已更新', 'success');
          setNewAdminPassword('');
        });
      };

      return (
        <div className="space-y-6 sm:space-y-8 max-w-4xl mx-auto animate-in fade-in duration-500 pb-12">
          <div>
            <h1 className="text-2xl sm:text-3xl font-semibold tracking-tight text-[#1d1d1f]">後台管理</h1>
            <p className="text-[#86868b] text-xs sm:text-sm mt-1.5 font-medium">系統安全與人員權限設定</p>
          </div>
          
          {/* 安全設定區塊 */}
          <Card className="p-0 overflow-hidden">
            <div className="p-5 sm:p-6 border-b border-[#d2d2d7]/30 bg-white/50 flex items-center">
              <div className="w-10 h-10 bg-[#1d1d1f]/5 rounded-xl flex items-center justify-center mr-4 shrink-0">
                <Icon name="Lock" className="w-5 h-5 text-[#1d1d1f]"/>
              </div>
              <div>
                <h3 className="font-semibold text-[#1d1d1f] tracking-tight text-sm sm:text-base">安全設定</h3>
                <p className="text-[11px] sm:text-xs text-[#86868b] mt-0.5">修改進入此後台的專屬密碼</p>
              </div>
            </div>
            <div className="p-5 sm:p-6 bg-white/30">
              <form onSubmit={handleUpdateAdminPassword} className="flex flex-col sm:flex-row items-start sm:items-end gap-3 sm:gap-4 max-w-md">
                <div className="flex-1 w-full">
                  <Input type="text" value={newAdminPassword} onChange={e => setNewAdminPassword(e.target.value)} placeholder="輸入新密碼..." />
                </div>
                <Button type="submit" className="w-full sm:w-auto">更新密碼</Button>
              </form>
            </div>
          </Card>

          {/* 使用者管理區塊 */}
          <Card className="p-0 overflow-hidden">
            <div className="p-5 sm:p-6 border-b border-[#d2d2d7]/30 bg-white/50 flex flex-col sm:flex-row sm:items-center justify-between gap-4 sm:gap-0">
              <div className="flex items-center">
                <div className="w-10 h-10 bg-[#0066cc]/10 rounded-xl flex items-center justify-center mr-4 shrink-0">
                  <Icon name="Users" className="w-5 h-5 text-[#0066cc]"/>
                </div>
                <div>
                  <h3 className="font-semibold text-[#1d1d1f] tracking-tight text-sm sm:text-base">人員權限</h3>
                  <p className="text-[11px] sm:text-xs text-[#86868b] mt-0.5">管理系統操作人員與角色</p>
                </div>
              </div>
              <Button size="sm" onClick={() => setIsAddUserOpen(true)} className="rounded-full w-full sm:w-auto"><Icon name="Plus" className="w-4 h-4 mr-1.5"/> 新增人員</Button>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left block md:table">
                <thead className="bg-[#f5f5f7]/50 text-[#86868b] border-b border-[#d2d2d7]/30 hidden md:table-header-group">
                  <tr>
                    <th className="px-6 py-4 font-medium">使用者</th>
                    <th className="px-6 py-4 font-medium">角色權限</th>
                    <th className="px-6 py-4 font-medium text-right">操作</th>
                  </tr>
                </thead>
                <tbody className="block md:table-row-group divide-y divide-[#d2d2d7]/30 bg-transparent md:bg-white/30 p-4 md:p-0">
                  {users.map(u => (
                    <tr key={u.id} className="block md:table-row hover:bg-[#f5f5f7]/50 md:hover:bg-white/80 transition-colors duration-200 bg-white mb-4 md:mb-0 rounded-2xl md:rounded-none p-4 md:p-0 shadow-sm md:shadow-none border border-[#d2d2d7]/30 md:border-none">
                      <td className="flex md:table-cell justify-between items-center px-2 md:px-6 py-3 md:py-4 border-b border-[#f5f5f7] md:border-none">
                        <span className="md:hidden text-xs font-bold text-[#86868b]">使用者</span>
                        <div className="flex items-center space-x-3 md:space-x-4 text-right md:text-left">
                          <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gradient-to-br from-[#f5f5f7] to-[#e5e5ea] border border-[#d2d2d7]/50 flex items-center justify-center font-semibold text-[#1d1d1f] shadow-sm shrink-0">{u.avatar}</div>
                          <div>
                            <div className="font-semibold text-[#1d1d1f]">{u.name}</div>
                            <div className="text-[11px] md:text-xs text-[#86868b] mt-0.5 font-medium">{u.email}</div>
                          </div>
                        </div>
                      </td>
                      <td className="flex md:table-cell justify-between items-center px-2 md:px-6 py-3 md:py-4 border-b border-[#f5f5f7] md:border-none">
                        <span className="md:hidden text-xs font-bold text-[#86868b]">角色權限</span>
                        <Badge className={u.role === 'admin' ? 'bg-[#ff3b30]/10 text-[#ff3b30] border-none' : u.role === 'leader' ? 'bg-[#0066cc]/10 text-[#0066cc] border-none' : 'bg-[#f5f5f7] text-[#86868b] border-none'}>
                          {u.role.toUpperCase()}
                        </Badge>
                      </td>
                      <td className="flex md:table-cell justify-between items-center px-2 md:px-6 py-3 md:py-4 md:text-right">
                        <span className="md:hidden text-xs font-bold text-[#86868b]">操作</span>
                        <div>
                          <button onClick={() => handleEditUserClick(u)} className="text-[#0066cc] hover:text-[#005bb5] p-2 rounded-full hover:bg-[#0066cc]/10 transition-colors mr-1"><Icon name="Edit2" className="w-4 h-4" /></button>
                          <button onClick={() => handleDeleteUser(u.id)} className="text-[#86868b] hover:text-[#ff3b30] p-2 rounded-full hover:bg-[#ff3b30]/10 transition-colors"><Icon name="Trash2" className="w-4 h-4" /></button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>

          {/* 新增人員 Modal */}
          <Modal isOpen={isAddUserOpen} onClose={() => setIsAddUserOpen(false)} title="新增人員">
            <form onSubmit={handleAddUser} className="space-y-4 sm:space-y-5">
              <div>
                <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">姓名</label>
                <Input value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="例如: 王大明" />
              </div>
              <div>
                <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">Email</label>
                <Input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} placeholder="例如: user@inv.sys" />
              </div>
              <div>
                <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">登入密碼</label>
                <Input type="text" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} placeholder="請輸入密碼" />
              </div>
              <div>
                <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">角色權限</label>
                <select className="flex h-11 w-full rounded-xl border border-[#d2d2d7] bg-white/50 px-4 py-2 text-sm text-[#1d1d1f] shadow-sm focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-[#0066cc]/10 focus-visible:border-[#0066cc] transition-all" value={formData.role} onChange={e => setFormData({...formData, role: e.target.value})}>
                  <option value="operator">Operator (一般操作員)</option>
                  <option value="leader">Leader (領班)</option>
                  <option value="admin">Admin (管理員)</option>
                </select>
              </div>
              <div className="pt-4 sm:pt-6 flex justify-end space-x-3">
                <Button type="button" variant="secondary" onClick={() => setIsAddUserOpen(false)}>取消</Button>
                <Button type="submit">確認新增</Button>
              </div>
            </form>
          </Modal>

          {/* 編輯人員 Modal */}
          <Modal isOpen={isEditUserOpen} onClose={() => setIsEditUserOpen(false)} title="編輯人員">
            {editFormData && (
              <form onSubmit={handleUpdateUser} className="space-y-4 sm:space-y-5">
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">姓名</label>
                  <Input value={editFormData.name} onChange={e => setEditFormData({...editFormData, name: e.target.value})} />
                </div>
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">Email</label>
                  <Input type="email" value={editFormData.email} onChange={e => setEditFormData({...editFormData, email: e.target.value})} />
                </div>
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">登入密碼</label>
                  <Input type="text" value={editFormData.newPassword || ''} onChange={e => setEditFormData({...editFormData, newPassword: e.target.value})} placeholder="若不修改請留空" />
                </div>
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">角色權限</label>
                  <select className="flex h-11 w-full rounded-xl border border-[#d2d2d7] bg-white/50 px-4 py-2 text-sm text-[#1d1d1f] shadow-sm focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-[#0066cc]/10 focus-visible:border-[#0066cc] transition-all" value={editFormData.role} onChange={e => setEditFormData({...editFormData, role: e.target.value})}>
                    <option value="operator">Operator (一般操作員)</option>
                    <option value="leader">Leader (領班)</option>
                    <option value="admin">Admin (管理員)</option>
                  </select>
                </div>
                <div className="pt-4 sm:pt-6 flex justify-end space-x-3">
                  <Button type="button" variant="secondary" onClick={() => setIsEditUserOpen(false)}>取消</Button>
                  <Button type="submit">儲存變更</Button>
                </div>
              </form>
            )}
          </Modal>
        </div>
      )
    }

    // ============================================================================
    // Sidebar & TaskList & MaterialManagement
    // ============================================================================
    const Sidebar = ({ activeTab, onTabChange, currentUser, users, onLogout, loginMode, isOpen, onClose, isDesktopOpen }) => {
      const menuItems = [
        { id: 'dashboard', icon: 'LayoutDashboard', label: '營運總覽', roles: ['admin', 'leader'] },
        { id: 'tasks', icon: 'ClipboardList', label: '任務管理', roles: ['admin', 'leader', 'operator'] },
        { id: 'vehicle_models', icon: 'Car', label: '車型管理', roles: ['admin', 'leader', 'operator'] },
        { id: 'settings', icon: 'Settings', label: '後台管理', roles: ['admin'] },
      ];

      let visibleMenus = menuItems.filter(m => m.roles.includes(currentUser.role));
      if (loginMode === 'admin') {
        visibleMenus = visibleMenus.filter(m => m.id === 'settings');
      }

      return (
        <aside className={`fixed inset-y-0 left-0 transform ${isOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 ${isDesktopOpen ? 'md:ml-0' : 'md:-ml-64'} transition-all duration-300 ease-in-out w-64 bg-white/80 backdrop-blur-3xl border-r border-[#d2d2d7]/50 flex flex-col z-50 shadow-[4px_0_24px_rgba(0,0,0,0.02)]`}>
          <div className="h-16 sm:h-20 flex items-center justify-between px-6 sm:px-8 border-b border-[#d2d2d7]/30 shrink-0">
            <div className="flex items-center">
              <span className="font-semibold text-lg tracking-tight text-[#1d1d1f]">INV System</span>
            </div>
            <button onClick={onClose} className="md:hidden text-[#86868b] hover:text-[#1d1d1f] p-2 -mr-2 rounded-full hover:bg-[#f5f5f7]">
              <Icon name="X" className="w-5 h-5" />
            </button>
          </div>
          <nav className="flex-1 py-6 px-4 overflow-y-auto">
            <div className="text-xs font-semibold text-[#86868b] mb-4 px-4 tracking-wider uppercase">選單</div>
            <ul className="space-y-1.5">
              {visibleMenus.map(item => (
                <li key={item.id}>
                  <button
                    onClick={() => { onTabChange(item.id); onClose(); }}
                    className={`w-full flex items-center px-4 py-3 rounded-xl transition-all duration-200 ease-out ${
                      activeTab === item.id 
                        ? 'bg-[#1d1d1f] text-white shadow-md' 
                        : 'text-[#86868b] hover:bg-[#f5f5f7] hover:text-[#1d1d1f]'
                    }`}
                  >
                    <Icon name={item.icon} className={`w-5 h-5 mr-3 ${activeTab === item.id ? 'opacity-100' : 'opacity-70'}`} />
                    <span className="font-medium text-sm">{item.label}</span>
                  </button>
                </li>
              ))}
              
              {/* 3DEXPERIENCE 外部連結 */}
              <li className="pt-4 mt-4 border-t border-[#d2d2d7]/30">
                <a
                  href="https://plm.china-motor.com.tw/3dpassport/login?service=https%3A%2F%2Fplm.china-motor.com.tw%2F3dspace%2F"
                  target="_blank"
                  rel="noopener noreferrer"
                  className="w-full flex items-center px-4 py-3 rounded-xl transition-all duration-200 ease-out text-[#86868b] hover:bg-[#f5f5f7] hover:text-[#1d1d1f]"
                >
                  <Icon name="Box" className="w-5 h-5 mr-3 opacity-70" />
                  <span className="font-medium text-sm">3DEXPERIENCE</span>
                  <Icon name="ExternalLink" className="w-3 h-3 ml-auto opacity-50" />
                </a>
              </li>
            </ul>
          </nav>
          <div className="p-5 sm:p-6 border-t border-[#d2d2d7]/30 relative bg-white/30 backdrop-blur-md">
            <div className="flex items-center space-x-3">
              <div className="w-10 h-10 rounded-full bg-gradient-to-br from-[#f5f5f7] to-[#e5e5ea] border border-[#d2d2d7]/50 flex items-center justify-center text-sm font-semibold text-[#1d1d1f] shadow-sm cursor-pointer shrink-0">{currentUser.avatar}</div>
              <div className="flex-1 cursor-pointer overflow-hidden">
                <div className="text-sm font-semibold text-[#1d1d1f] truncate">{currentUser.name}</div>
                <div className="text-[11px] text-[#86868b] font-medium uppercase tracking-wider mt-0.5">{currentUser.role}</div>
              </div>
              <button onClick={onLogout} title="登出系統" className="p-2 hover:bg-[#f5f5f7] rounded-full transition-colors shrink-0">
                <Icon name="LogOut" className="w-4 h-4 text-[#86868b] hover:text-[#1d1d1f]" />
              </button>
            </div>
          </div>
        </aside>
      );
    };

    const TaskList = ({ tasks, materials, onSelectTask, currentUser, users, isConnected }) => {
      const [isAddTaskOpen, setIsAddTaskOpen] = useState(false);
      const [isEditTaskOpen, setIsEditTaskOpen] = useState(false);
      const [editTaskData, setEditTaskData] = useState(null);
      const [accessModalTask, setAccessModalTask] = useState(null);
      const [formData, setFormData] = useState({ title: '', description: '', due_date: '' });
      const [deleteConfirmTaskId, setDeleteConfirmTaskId] = useState(null);

      const handleCloseAddTask = () => {
        setIsAddTaskOpen(false);
        setFormData({ title: '', description: '', due_date: '' });
      };

      const handleAddTask = (e) => {
        e.preventDefault();
        if (!isConnected) return showToast('系統未連線，請檢查網路狀態', 'error');
        if(!formData.title) return showToast('請填寫任務標題', 'error');
        
        const newRef = db.ref('tasks').push();
        newRef.set({
          id: newRef.key,
          title: formData.title,
          description: formData.description,
          due_date: formData.due_date || new Date().toISOString().split('T')[0],
          status: 'pending',
          progress: 0,
          type: 'warehouse',
          created_at: new Date().toISOString().split('T')[0],
          owner_id: currentUser.id,
          allowed_users: [currentUser.id]
        }).then(() => {
          showToast('任務新增成功', 'success');
          setIsAddTaskOpen(false);
          setFormData({ title: '', description: '', due_date: '' });
        });
      };

      const handleEditTaskClick = (e, task) => {
        e.stopPropagation();
        setEditTaskData(task);
        setIsEditTaskOpen(true);
      };

      const handleUpdateTask = (e) => {
        e.preventDefault();
        if (!isConnected) return showToast('系統未連線，請檢查網路狀態', 'error');
        if (!editTaskData.title) return showToast('請填寫任務標題', 'error');

        const originalTask = tasks.find(t => t.id === editTaskData.id);
        const diffs = [];
        if (originalTask.title !== editTaskData.title) diffs.push({ field: '任務標題', old: originalTask.title, new: editTaskData.title });
        if (originalTask.description !== editTaskData.description) diffs.push({ field: '任務描述', old: originalTask.description, new: editTaskData.description });
        if (originalTask.due_date !== editTaskData.due_date) diffs.push({ field: '到期日', old: originalTask.due_date, new: editTaskData.due_date });

        if (diffs.length > 0) {
          db.ref(`tasks/${editTaskData.id}`).update({
            title: editTaskData.title,
            description: editTaskData.description,
            due_date: editTaskData.due_date
          }).then(() => {
            db.ref('audit_logs').push({
              task_id: editTaskData.id,
              action: 'UPDATE',
              action_label: '編輯任務',
              entity_name: editTaskData.title,
              changes: diffs,
              user_name: currentUser.name,
              timestamp: new Date().toISOString()
            });
            showToast('任務更新成功', 'success');
            setIsEditTaskOpen(false);
          });
        } else {
          setIsEditTaskOpen(false);
        }
      };

      const handleDeleteTask = (e, id) => {
        e.preventDefault();
        e.stopPropagation();
        if (!isConnected) return showToast('系統未連線，請檢查網路狀態', 'error');
        setDeleteConfirmTaskId(id);
      };

      const confirmDeleteTask = () => {
        if (!deleteConfirmTaskId) return;
        const promises = [db.ref(`tasks/${deleteConfirmTaskId}`).remove()];
        materials.filter(m => m.task_id === deleteConfirmTaskId).forEach(m => {
          promises.push(db.ref(`materials/${m.id}`).remove());
        });
        
        Promise.all(promises).then(() => {
          showToast('任務及相關物料已刪除', 'success');
          setDeleteConfirmTaskId(null);
        }).catch(err => {
          showToast('刪除失敗：' + err.message, 'error');
          setDeleteConfirmTaskId(null);
        });
      };

      return (
        <div className="space-y-6 sm:space-y-8 max-w-7xl mx-auto animate-in fade-in duration-500 pb-12">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
              <h1 className="text-2xl sm:text-3xl font-semibold tracking-tight text-[#1d1d1f]">任務管理</h1>
              <p className="text-[#86868b] text-xs sm:text-sm mt-1.5 font-medium">建立與管理所有的盤點與清點任務</p>
            </div>
            {currentUser.role === 'admin' && (
              <Button onClick={() => setIsAddTaskOpen(true)} className="w-full sm:w-auto"><Icon name="Plus" className="w-4 h-4 mr-2" /> 新增任務</Button>
            )}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6">
            {tasks.map((task) => (
              <Card key={task.id} className="hover:shadow-[0_12px_40px_rgba(0,0,0,0.08)] hover:-translate-y-1 transition-all duration-300 cursor-pointer group border-transparent hover:border-[#d2d2d7]/50" >
                <div className="p-5 sm:p-6 flex flex-col h-full" onClick={() => onSelectTask(task.id)}>
                  <div className="flex justify-between items-start mb-4 sm:mb-5">
                    <Badge className={
                      task.status === 'in_progress' ? 'bg-[#0066cc]/10 text-[#0066cc] border-none' :
                      task.status === 'pending' ? 'bg-[#ff9500]/10 text-[#ff9500] border-none' :
                      'bg-[#34c759]/10 text-[#34c759] border-none'
                    }>
                      {task.status === 'in_progress' ? '進行中' : task.status === 'pending' ? '未開始' : '已完成'}
                    </Badge>
                    <div className="flex items-center opacity-100 lg:opacity-0 group-hover:opacity-100 transition-all duration-200">
                      { (task.owner_id === currentUser.id) && (
                        <button onClick={(e) => { e.stopPropagation(); setAccessModalTask(task); }} className="text-[#86868b] hover:text-[#0066cc] p-1.5 rounded-full hover:bg-[#0066cc]/10 mr-1" title="權限管理">
                          <Icon name="Users" className="w-4 h-4" />
                        </button>
                      )}
                      { (task.owner_id === currentUser.id) && (
                        <button onClick={(e) => handleEditTaskClick(e, task)} className="text-[#86868b] hover:text-[#0066cc] p-1.5 rounded-full hover:bg-[#0066cc]/10 mr-1" title="編輯任務">
                          <Icon name="Edit2" className="w-4 h-4" />
                        </button>
                      )}
                      { (task.owner_id === currentUser.id) && (
                        <button onClick={(e) => handleDeleteTask(e, task.id)} className="text-[#86868b] hover:text-[#ff3b30] p-1.5 rounded-full hover:bg-[#ff3b30]/10" title="刪除任務">
                          <Icon name="Trash2" className="w-4 h-4" />
                        </button>
                      )}
                    </div>
                  </div>
                  <h3 className="text-lg sm:text-xl font-semibold tracking-tight mb-1.5 text-[#1d1d1f]">{task.title}</h3>
                  <div className="mb-3 flex items-center gap-2">
                    <span className="inline-flex items-center text-[10px] sm:text-[11px] font-semibold text-[#86868b] bg-[#f5f5f7] px-2 py-1 rounded-md border border-[#d2d2d7]/50">
                      <Icon name="Package" className="w-3 h-3 mr-1.5 opacity-70" />
                      共 {task.materialCount} 項
                    </span>
                  </div>
                  <p className="text-[#86868b] text-xs sm:text-sm line-clamp-2 mb-5 sm:mb-6 flex-1 leading-relaxed">{task.description}</p>
                  
                  <div className="space-y-2 sm:space-y-2.5 mb-5 sm:mb-6 shrink-0">
                    <div className="flex justify-between text-[10px] sm:text-xs font-semibold text-[#86868b] uppercase tracking-wider">
                      <span>進度</span>
                      <span className={task.progress === 100 ? 'text-[#34c759]' : 'text-[#1d1d1f]'}>{task.progress}%</span>
                    </div>
                    <div className="w-full bg-[#f5f5f7] rounded-full h-1.5 overflow-hidden">
                      <div className={`h-full rounded-full transition-all duration-1000 ease-out ${task.progress === 100 ? 'bg-[#34c759]' : 'bg-[#1d1d1f]'}`} style={{ width: `${task.progress}%` }}></div>
                    </div>
                  </div>

                  <div className="flex justify-between items-center text-[10px] sm:text-xs font-medium text-[#86868b] pt-4 sm:pt-5 border-t border-[#d2d2d7]/30 shrink-0">
                    <span className="flex items-center"><Icon name="Calendar" className="w-3.5 h-3.5 mr-1.5 opacity-70"/> {task.due_date}</span>
                    <span className="flex items-center text-[#1d1d1f] font-semibold lg:group-hover:text-[#0066cc] transition-colors bg-[#f5f5f7] lg:group-hover:bg-[#0066cc]/10 px-3 py-1.5 rounded-full">
                      進入任務 <Icon name="ArrowRight" className="w-3.5 h-3.5 ml-1.5" />
                    </span>
                  </div>
                </div>
              </Card>
            ))}
          </div>

          <Modal isOpen={isAddTaskOpen} onClose={handleCloseAddTask} title="新增任務">
            <form onSubmit={handleAddTask} className="space-y-4 sm:space-y-5">
              <div>
                <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">任務標題</label>
                <Input value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} placeholder="例如: 6月第一週倉庫盤點" />
              </div>
              <div>
                <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">任務描述</label>
                <Input value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} placeholder="簡短說明..." />
              </div>
              <div>
                <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">到期日</label>
                <Input type="date" max="9999-12-31" value={formData.due_date} onChange={e => setFormData({...formData, due_date: e.target.value})} />
              </div>
              <div className="pt-4 sm:pt-6 flex justify-end space-x-3">
                <Button type="button" variant="secondary" onClick={handleCloseAddTask}>取消</Button>
                <Button type="submit">確認新增</Button>
              </div>
            </form>
          </Modal>

          <Modal isOpen={isEditTaskOpen} onClose={() => setIsEditTaskOpen(false)} title="編輯任務">
            {editTaskData && (
              <form onSubmit={handleUpdateTask} className="space-y-4 sm:space-y-5">
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">任務標題</label>
                  <Input value={editTaskData.title} onChange={e => setEditTaskData({...editTaskData, title: e.target.value})} required />
                </div>
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">任務描述</label>
                  <Input value={editTaskData.description} onChange={e => setEditTaskData({...editTaskData, description: e.target.value})} />
                </div>
                <div>
                  <label className="block text-xs sm:text-sm font-semibold text-[#1d1d1f] mb-1.5 sm:mb-2">到期日</label>
                  <Input type="date" max="9999-12-31" value={editTaskData.due_date} onChange={e => setEditTaskData({...editTaskData, due_date: e.target.value})} />
                </div>
                <div className="pt-4 sm:pt-6 flex justify-end space-x-3">
                  <Button type="button" variant="secondary" onClick={() => setIsEditTaskOpen(false)}>取消</Button>
                  <Button type="submit">儲存變更</Button>
                </div>
              </form>
            )}
          </Modal>

          <Modal isOpen={!!deleteConfirmTaskId} onClose={() => setDeleteConfirmTaskId(null)} title="確認刪除">
            <div className="space-y-4">
              <p className="text-[#1d1d1f] text-sm">確定要刪除此任務嗎？（相關的物料清單將一併被永久刪除）</p>
              <div className="pt-4 sm:pt-6 flex justify-end space-x-3">
