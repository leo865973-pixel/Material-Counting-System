            </div>
            <div className="flex space-x-2 sm:space-x-3 w-full sm:w-auto pb-1 sm:pb-0">
              {canEdit && selectedIds.size > 0 && (
                <Button variant="danger" onClick={executeBatchDelete} className="flex-1 sm:flex-none whitespace-nowrap">
                  <Icon name="Trash2" className="w-4 h-4 mr-1.5" /> 刪除選取 ({selectedIds.size})
                </Button>
              )}
              {canEdit && (
                <>
                  <Button variant="secondary" onClick={() => setIsExcelModalOpen(true)} className="flex-1 sm:flex-none whitespace-nowrap">
                    <Icon name="FileSpreadsheet" className="w-4 h-4 mr-1.5 sm:mr-2 text-[#34c759]" /> <span className="hidden sm:inline">Excel 作業</span><span className="sm:hidden">Excel</span>
                  </Button>
                  <Button onClick={() => setIsAddMaterialOpen(true)} className="flex-1 sm:flex-none whitespace-nowrap">
                    <Icon name="Plus" className="w-4 h-4 mr-1.5 sm:mr-2" /> 新增物料
                  </Button>
                </>
              )}
            </div>
          </div>

          <div className="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3 shrink-0">
            <div className="relative flex-1 max-w-full sm:max-w-md">
              <Icon name="Search" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-[#86868b] pointer-events-none z-10" />
              <Input placeholder="搜尋UPG、件號、件名..." className="pl-11 bg-white shadow-sm border-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>
            </div>
            {uniqueGroups.length > 0 && (
              <select 
                className="flex h-11 rounded-xl border border-[#d2d2d7] bg-white px-4 py-2 text-sm text-[#1d1d1f] shadow-sm focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-[#0066cc]/10 focus-visible:border-[#0066cc] transition-all cursor-pointer w-full sm:w-auto"
                value={filterGroup}
                onChange={(e) => setFilterGroup(e.target.value)}
              >
                <option value="all">所有分組</option>
                {uniqueGroups.map(g => <option key={g} value={g}>{g}</option>)}
              </select>
            )}
          </div>

          <Card className="flex-1 overflow-hidden p-0 rounded-2xl sm:rounded-3xl border-none shadow-[0_8px_30px_rgb(0,0,0,0.04)] bg-transparent lg:bg-white relative">
            <div className="overflow-auto h-full">
              <table className="w-full text-sm text-left whitespace-normal lg:whitespace-nowrap block lg:table">
                <thead className="bg-[#f5f5f7]/80 backdrop-blur-xl text-[#86868b] sticky top-0 z-10 border-b border-[#d2d2d7]/30 hidden lg:table-header-group">
                  <tr>
                    {canEdit && <th className="px-4 py-4 w-10 text-center"><input type="checkbox" className="w-4 h-4 rounded cursor-pointer" checked={selectedIds.size > 0 && selectedIds.size === processedMaterials.length} onChange={toggleSelectAll} /></th>}
                    <th className="px-4 py-4 font-semibold tracking-wide min-w-[250px]">件號 / 件名 (UPG)</th>
                    <th className="px-4 py-4 font-semibold tracking-wide min-w-[120px]">中文件名</th>
                    <th className="px-4 py-4 font-semibold tracking-wide w-24 text-center">分類</th>
                    <th className="px-4 py-4 font-semibold tracking-wide w-24 text-center">廠商</th>
                    <th className="px-4 py-4 font-semibold tracking-wide w-24 text-center">儲位</th>
                    <th className="px-4 py-4 font-semibold tracking-wide text-center w-20">單台用量</th>
                    <th className="px-4 py-4 font-semibold tracking-wide w-32 text-center cursor-pointer hover:bg-[#d2d2d7]/30 transition-colors" onClick={() => handleSort('assembly_group')}>
                      <div className="flex items-center justify-center">
                        分組
                        {sortConfig.key === 'assembly_group' && <Icon name={sortConfig.direction === 'asc' ? 'ChevronUp' : 'ChevronDown'} className="w-4 h-4 ml-1" />}
                      </div>
                    </th>
                    <th className="px-4 py-4 font-semibold tracking-wide w-32 text-center">標籤</th>
                    <th className="px-4 py-4 font-semibold tracking-wide text-center sticky right-0 bg-[#f5f5f7]/80 backdrop-blur-xl shadow-[-10px_0_15px_-10px_rgba(0,0,0,0.05)] w-24">操作</th>
                  </tr>
                </thead>
                <tbody className="block lg:table-row-group divide-y divide-[#d2d2d7]/30 bg-transparent lg:bg-white/30 p-2 lg:p-0">
                  {processedMaterials.map((mat) => (
                    <tr key={mat.id} 
                        className={`block lg:table-row hover:bg-[#f5f5f7]/50 transition-colors duration-200 group mb-4 lg:mb-0 rounded-2xl lg:rounded-none p-4 lg:p-0 shadow-sm lg:shadow-none border lg:border-none cursor-default ${selectedIds.has(mat.id) ? 'bg-[#0066cc]/5 border-[#0066cc]/30' : 'bg-white border-[#d2d2d7]/50'}`}
                        onMouseMove={(e) => { setHoverPos({x: e.clientX, y: e.clientY}); setHoverMat(mat); }}
                        onMouseLeave={() => setHoverMat(null)}
                    >
                      {canEdit && (
                        <td className="hidden lg:table-cell px-4 py-4">
                          <input type="checkbox" className="w-4 h-4 rounded cursor-pointer" checked={selectedIds.has(mat.id)} onChange={() => toggleSelect(mat.id)} onClick={e => e.stopPropagation()} />
                        </td>
                      )}
                      <td className="flex lg:table-cell flex-col lg:flex-row items-start lg:items-center px-2 lg:px-4 py-3 lg:py-4 border-b border-[#f5f5f7] lg:border-none max-w-full lg:max-w-[300px] truncate">
                        <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider mb-1.5">件號 / 件名</span>
                        <div className="w-full truncate">
                          <div className="flex items-center truncate mb-1">
                            {mat.part_code && <span className="bg-[#1d1d1f] text-white px-2 py-0.5 rounded text-[10px] font-bold tracking-wider mr-2 shrink-0">{mat.part_code}</span>}
                            <span className="font-bold text-[#1d1d1f] text-base tracking-tight truncate">{mat.part_name}</span>
                          </div>
                          <div className="text-[#86868b] text-xs truncate font-medium flex items-center">
                            <span className="mr-1.5 border border-[#d2d2d7] px-1.5 py-0.5 rounded text-[10px] text-[#86868b] font-bold">UPG</span>
                            {mat.part_number}
                          </div>
                        </div>
                      </td>
                      <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                        <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">中文件名</span>
                        <span className="text-[#86868b] font-medium truncate text-left">{mat.part_name_zh || '-'}</span>
                      </td>
                      <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                        <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">分類</span>
                        <span className="text-[#86868b] font-medium truncate block lg:text-center">{mat.category || '-'}</span>
                      </td>
                      <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                        <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">廠商</span>
                        <span className="text-[#86868b] font-medium truncate block lg:text-center">{mat.supplier || '-'}</span>
                      </td>
                      <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                        <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">儲位</span>
                        <span className="text-[#1d1d1f] font-semibold truncate block lg:text-center">{mat.location || '-'}</span>
                      </td>
                      <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                        <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">單台用量</span>
                        <span className="block font-semibold text-[#1d1d1f] lg:text-center">{mat.usage_per_unit || 1}</span>
                      </td>
                      <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                        <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">分組</span>
                        <span className="text-[#1d1d1f] font-medium truncate block lg:text-center">{mat.assembly_group || '-'}</span>
                      </td>
                      <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-2.5 lg:py-4 border-b border-[#f5f5f7] lg:border-none">
                        <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">標籤</span>
                        <div className="flex flex-wrap justify-end lg:justify-center gap-1.5">
                          {mat.tags?.map(tag => <Badge key={tag.id} className={tag.color}>{tag.name}</Badge>)}
                        </div>
                      </td>
                      <td className="flex lg:table-cell justify-between items-center px-2 lg:px-4 py-3 lg:py-4 lg:text-center lg:sticky lg:right-0 lg:bg-white group-hover:bg-[#f5f5f7]/50 transition-colors lg:shadow-[-10px_0_15px_-10px_rgba(0,0,0,0.02)]">
                        <span className="lg:hidden text-xs font-bold text-[#86868b] uppercase tracking-wider">操作</span>
                        <div className="flex items-center justify-end lg:justify-center space-x-1">
                          {canEdit && (
                            <>
                              <input type="checkbox" className="lg:hidden w-4 h-4 rounded cursor-pointer mr-1" checked={selectedIds.has(mat.id)} onChange={() => toggleSelect(mat.id)} />
                              <button onClick={() => handleEditMaterialClick(mat)} className="text-[#86868b] hover:text-[#0066cc] transition-colors p-2 rounded-full hover:bg-[#0066cc]/10"><Icon name="Edit2" className="w-4 h-4" /></button>
                              <button onClick={() => setDeleteConfirmId(mat.id)} className="text-[#86868b] hover:text-[#ff3b30] transition-colors p-2 rounded-full hover:bg-[#ff3b30]/10"><Icon name="Trash2" className="w-4 h-4" /></button>
                            </>
                          )}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* Hover Tooltip */}
            {hoverMat && ReactDOM.createPortal(
              <div className="fixed z-[100] bg-white/95 backdrop-blur-xl border border-[#d2d2d7] shadow-[0_10px_40px_rgba(0,0,0,0.15)] rounded-2xl p-4 w-72 pointer-events-none transition-opacity duration-150" 
                   style={{
                     top: hoverPos.y + 280 > window.innerHeight ? hoverPos.y - 280 : hoverPos.y + 12,
                     left: hoverPos.x + 300 > window.innerWidth ? hoverPos.x - 300 : hoverPos.x + 12
                   }}>
                {hoverMat.image ? (
                  <img src={hoverMat.image} className="w-full h-32 object-contain mb-3 bg-[#f5f5f7] rounded-lg border border-[#d2d2d7]/50" />
                ) : (
                  <div className="w-full h-24 mb-3 bg-[#f5f5f7] rounded-lg border border-[#d2d2d7]/50 flex items-center justify-center text-[#86868b]">
                    <Icon name="Image" className="w-8 h-8 opacity-50" />
                  </div>
                )}
                <div className="font-bold text-sm text-[#1d1d1f] mb-1">{hoverMat.part_name}</div>
                <div className="text-xs text-[#86868b] mb-3">{hoverMat.part_number}</div>
                <div className="text-xs space-y-1.5 text-[#1d1d1f] border-t border-[#d2d2d7]/50 pt-2">
                   <div><span className="font-bold text-[#86868b]">分組:</span> {hoverMat.assembly_group || '-'}</div>
                   <div><span className="font-bold text-[#86868b]">規格參數:</span> <span className="whitespace-pre-wrap">{hoverMat.spec_params || '-'}</span></div>
                   {hoverMat.remark && <div><span className="font-bold text-[#86868b]">備註:</span> {hoverMat.remark}</div>}
                </div>
              </div>,
              document.body
            )}
          </Card>

          <VehicleExcelManagerModal isOpen={isExcelModalOpen} onClose={() => setIsExcelModalOpen(false)} section={section} materials={materials} onImportSuccess={onImportSuccess}/>

          <Modal isOpen={isAddMaterialOpen} onClose={() => setIsAddMaterialOpen(false)} title="新增車型物料">
            <form onSubmit={handleAddMaterial} className="space-y-4 sm:space-y-5">
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">UPG *</label>
                  <Input value={formData.part_number} onChange={e => setFormData({...formData, part_number: e.target.value})} required/>
                </div>
                <div>
                  <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">件號</label>
                  <Input value={formData.part_code} onChange={e => setFormData({...formData, part_code: e.target.value})} />
                </div>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">件名</label>
                  <Input value={formData.part_name} onChange={e => setFormData({...formData, part_name: e.target.value})} />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">中文件名</label>
                  <Input value={formData.part_name_zh} onChange={e => setFormData({...formData, part_name_zh: e.target.value})} placeholder="例如: 前保险杠" />
                </div>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">單台用量</label>
                  <Input type="number" min="1" value={formData.usage_per_unit} onChange={e => setFormData({...formData, usage_per_unit: e.target.value})} />
                </div>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">分組 (作業段)</label>
                  <Input value={formData.assembly_group} onChange={e => setFormData({...formData, assembly_group: e.target.value})} placeholder="例如: 觸媒組立" />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">零件分類</label>
                  <Input value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} />
                </div>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">廠商</label>
                  <Input value={formData.supplier} onChange={e => setFormData({...formData, supplier: e.target.value})} />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">儲位</label>
                  <Input value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} />
                </div>
              </div>
              <div>
                <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">規格參數</label>
                <Input value={formData.spec_params} onChange={e => setFormData({...formData, spec_params: e.target.value})} placeholder="尺寸、重量等參數..." />
              </div>
              <div>
                <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">標籤 (以逗號分隔)</label>
                <Input value={formData.tags} onChange={e => setFormData({...formData, tags: e.target.value})} />
              </div>
              <div>
                <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">物料圖片 (貼上或輸入網址)</label>
                <div onPaste={(e) => handlePasteImage(e, false)} className="border-2 border-dashed border-[#d2d2d7] p-4 rounded-xl text-center bg-white/50 focus-within:border-[#0066cc]/50 transition-colors">
                  {formData.image ? (
                    <div className="relative inline-block">
                      <img src={formData.image} className="max-h-32 mx-auto rounded shadow-sm" />
                      <button type="button" onClick={() => setFormData({...formData, image: ''})} className="absolute -top-2 -right-2 bg-[#ff3b30] text-white p-1 rounded-full shadow-md"><Icon name="X" className="w-3 h-3"/></button>
                    </div>
                  ) : (
                    <div className="text-[#86868b] text-sm py-4 pointer-events-none">點擊此處並貼上圖片 (Ctrl+V)</div>
                  )}
                  <Input value={formData.image} onChange={e => setFormData({...formData, image: e.target.value})} placeholder="或輸入圖片網址..." className="mt-3 text-xs h-9" />
                </div>
              </div>
              <div className="pt-4 sm:pt-6 flex justify-end space-x-3">
                <Button type="button" variant="secondary" onClick={() => setIsAddMaterialOpen(false)}>取消</Button>
                <Button type="submit">確認新增</Button>
              </div>
            </form>
          </Modal>

          <Modal isOpen={isEditMaterialOpen} onClose={() => setIsEditMaterialOpen(false)} title="編輯車型物料">
            {editFormData && (
              <form onSubmit={handleUpdateMaterial} className="space-y-4 sm:space-y-5">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">UPG *</label>
                    <Input value={editFormData.part_number} onChange={e => setEditFormData({...editFormData, part_number: e.target.value})} required/>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">件號</label>
                    <Input value={editFormData.part_code} onChange={e => setEditFormData({...editFormData, part_code: e.target.value})} />
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">件名</label>
                    <Input value={editFormData.part_name} onChange={e => setEditFormData({...editFormData, part_name: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">中文件名</label>
                    <Input value={editFormData.part_name_zh || ''} onChange={e => setEditFormData({...editFormData, part_name_zh: e.target.value})} />
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">單台用量</label>
                    <Input type="number" min="1" value={editFormData.usage_per_unit} onChange={e => setEditFormData({...editFormData, usage_per_unit: e.target.value})} />
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">分組 (作業段)</label>
                    <Input value={editFormData.assembly_group} onChange={e => setEditFormData({...editFormData, assembly_group: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">零件分類</label>
                    <Input value={editFormData.category} onChange={e => setEditFormData({...editFormData, category: e.target.value})} />
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">廠商</label>
                    <Input value={editFormData.supplier} onChange={e => setEditFormData({...editFormData, supplier: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">儲位</label>
                    <Input value={editFormData.location} onChange={e => setEditFormData({...editFormData, location: e.target.value})} />
                  </div>
                </div>
                <div>
                  <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">規格參數</label>
                  <Input value={editFormData.spec_params} onChange={e => setEditFormData({...editFormData, spec_params: e.target.value})} />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">標籤 (以逗號分隔)</label>
                  <Input value={editFormData.tags} onChange={e => setEditFormData({...editFormData, tags: e.target.value})} />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-[#1d1d1f] mb-1">物料圖片 (貼上或輸入網址)</label>
                  <div onPaste={(e) => handlePasteImage(e, true)} className="border-2 border-dashed border-[#d2d2d7] p-4 rounded-xl text-center bg-white/50 focus-within:border-[#0066cc]/50 transition-colors">
                    {editFormData.image ? (
                      <div className="relative inline-block">
                        <img src={editFormData.image} className="max-h-32 mx-auto rounded shadow-sm" />
                        <button type="button" onClick={() => setEditFormData({...editFormData, image: ''})} className="absolute -top-2 -right-2 bg-[#ff3b30] text-white p-1 rounded-full shadow-md"><Icon name="X" className="w-3 h-3"/></button>
                      </div>
                    ) : (
                      <div className="text-[#86868b] text-sm py-4 pointer-events-none">點擊此處並貼上圖片 (Ctrl+V)</div>
                    )}
                    <Input value={editFormData.image || ''} onChange={e => setEditFormData({...editFormData, image: e.target.value})} placeholder="或輸入圖片網址..." className="mt-3 text-xs h-9" />
                  </div>
                </div>
                <div className="pt-4 sm:pt-6 flex justify-end space-x-3">
                  <Button type="button" variant="secondary" onClick={() => setIsEditMaterialOpen(false)}>取消</Button>
                  <Button type="submit">儲存變更</Button>
                </div>
              </form>
            )}
          </Modal>

          <Modal isOpen={!!deleteConfirmId} onClose={() => setDeleteConfirmId(null)} title="確認刪除">
            <div className="space-y-4 sm:space-y-5">
              <div className="flex items-center justify-center p-4 bg-[#ff3b30]/10 rounded-2xl">
                <Icon name="AlertTriangle" className="w-8 h-8 text-[#ff3b30] mr-3" />
                <p className="text-[#1d1d1f] font-medium">確定要刪除此物料嗎？此動作無法復原。</p>
              </div>
              <div className="pt-4 sm:pt-6 flex justify-end space-x-3">
                <Button variant="secondary" onClick={() => setDeleteConfirmId(null)}>取消</Button>
                <Button variant="danger" onClick={executeDeleteMaterial}>確認刪除</Button>
              </div>
            </div>
          </Modal>
        </div>
      );
    };

    // ============================================================================
    // Main Application App
    // ============================================================================
    function App() {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [loginMode, setLoginMode] = useState('normal'); // 'normal' | 'admin'
      
      const [currentUser, setCurrentUser] = useState(MOCK_USERS[0]);
      const [activeTab, setActiveTab] = useState(currentUser.role === 'operator' ? 'tasks' : 'dashboard');
      
      const [selectedTaskId, setSelectedTaskId] = useState(null);
      const [countingMaterialId, setCountingMaterialId] = useState(null);
      
      const [selectedVehicleModelId, setSelectedVehicleModelId] = useState(null);
      const [selectedVehicleSectionId, setSelectedVehicleSectionId] = useState(null);

      const [users, setUsers] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [materials, setMaterials] = useState([]);
      
      const [vehicleModels, setVehicleModels] = useState([]);
      const [vehicleSections, setVehicleSections] = useState([]);
      const [vehicleMaterials, setVehicleMaterials] = useState([]);
      
      const [auditLogs, setAuditLogs] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const loadingTimeoutRef = useRef(null);
      
      const [adminPassword, setAdminPassword] = useState('admin');
      
      // Auth Modal State (For accessing settings in normal mode)
      const [isAuthModalOpen, setIsAuthModalOpen] = useState(false);
      const [authPassword, setAuthPassword] = useState('');

      // Sidebar State
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [isDesktopSidebarOpen, setIsDesktopSidebarOpen] = useState(true);
      const [isConnected, setIsConnected] = useState(true);

      // Firebase Realtime Database Listener
      useEffect(() => {
        const usersRef = db.ref('users');
        const tasksRef = db.ref('tasks');
        const materialsRef = db.ref('materials');
        const pwdRef = db.ref('adminPassword');
        const logsRef = db.ref('audit_logs');
        
        const vmRef = db.ref('vehicle_models');
        const vsRef = db.ref('vehicle_sections');
        const vMatRef = db.ref('vehicle_materials');
        
        const connectedRef = db.ref('.info/connected');

        // 超時保護：若 Firebase 在 8 秒內無回應，強制結束 loading
        loadingTimeoutRef.current = setTimeout(() => {
          setIsLoading(false);
        }, 8000);

        connectedRef.on('value', (snap) => {
          setIsConnected(snap.val() === true);
        });

        pwdRef.on('value', (snapshot) => {
          const val = snapshot.val();
          if (val) {
            setAdminPassword(val);
          } else {
            pwdRef.set('admin');
            setAdminPassword('admin');
          }
        });

        usersRef.on('value', (snapshot) => {
          const data = snapshot.val();
          if (data) {
            setUsers(Object.keys(data).map(key => ({ ...data[key], id: key })));
          } else {
            const initialUsers = MOCK_USERS.reduce((acc, u) => ({...acc, [u.id]: u}), {});
            usersRef.set(initialUsers);
          }
        });

        // 任務資料載入與舊資料轉移機制
        usersRef.once('value').then(userSnap => {
          const usersData = userSnap.val();
          const usersList = usersData ? Object.keys(usersData).map(key => ({ ...usersData[key], id: key })) : MOCK_USERS;
          const firstAdmin = usersList.find(u => u.role === 'admin') || MOCK_USERS[0];
          
          tasksRef.on('value', (taskSnap) => {
            const taskData = taskSnap.val();
            if (taskData) {
              const updates = {};
              let hasUpdates = false;
              
              const tasksArray = Object.keys(taskData).map(taskId => {
                const t = { ...taskData[taskId], id: taskId };
                const currentOwner = usersList.find(u => u.id === t.owner_id);
                // 如果沒有負責人，或負責人不是 admin，則自動轉移給第一個 admin
                if (!t.owner_id || !currentOwner || currentOwner.role !== 'admin') {
                  updates[`${taskId}/owner_id`] = firstAdmin.id;
                  const currentAllowed = t.allowed_users || [];
                  if (!currentAllowed.includes(firstAdmin.id)) {
                    updates[`${taskId}/allowed_users`] = [...currentAllowed, firstAdmin.id];
                  }
                  hasUpdates = true;
                  t.owner_id = firstAdmin.id;
                  t.allowed_users = [...currentAllowed, firstAdmin.id];
                }
                return t;
              });
              
              if (hasUpdates) {
                tasksRef.update(updates);
              }
              setTasks(tasksArray);
            } else {
              const initialTasks = MOCK_TASKS.reduce((acc, t) => ({...acc, [t.id]: t}), {});
              tasksRef.set(initialTasks);
            }
          });
        });

        materialsRef.on('value', (snapshot) => {
          const data = snapshot.val();
          if (data) {
            setMaterials(Object.keys(data).map(key => ({ ...data[key], id: key })));
          } else {
            const initialMaterials = MOCK_MATERIALS.reduce((acc, m) => ({...acc, [m.id]: m}), {});
            materialsRef.set(initialMaterials);
          }
        });
        
        vmRef.on('value', (snapshot) => {
          const data = snapshot.val();
          if (data) setVehicleModels(Object.keys(data).map(key => ({ ...data[key], id: key })));
          else setVehicleModels([]);
        });
        
        vsRef.on('value', (snapshot) => {
          const data = snapshot.val();
          if (data) setVehicleSections(Object.keys(data).map(key => ({ ...data[key], id: key })));
          else setVehicleSections([]);
        });
        
        vMatRef.on('value', (snapshot) => {
          const data = snapshot.val();
          if (data) setVehicleMaterials(Object.keys(data).map(key => ({ ...data[key], id: key })));
          else setVehicleMaterials([]);
          // Firebase 資料已載入，清除超時計時器並結束 loading
          if (loadingTimeoutRef.current) clearTimeout(loadingTimeoutRef.current);
          setIsLoading(false);
        });

        logsRef.on('value', (snapshot) => {
          const data = snapshot.val();
          if (data) {
            setAuditLogs(Object.values(data).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
          } else {
            setAuditLogs([]);
          }
        });

        return () => {
          usersRef.off();
          tasksRef.off();
          materialsRef.off();
          pwdRef.off();
          logsRef.off();
          vmRef.off();
          vsRef.off();
          vMatRef.off();
          connectedRef.off();
          if (loadingTimeoutRef.current) clearTimeout(loadingTimeoutRef.current);
        };
      }, []);

      const tasksWithProgress = useMemo(() => {
        return tasks.map(task => {
          const tMats = materials.filter(m => m.task_id === task.id);
          const materialCount = tMats.length;
          if (materialCount === 0) return { ...task, progress: 0, materialCount: 0 };
          const progress = Math.round((tMats.filter(m => m.counted_qty >= m.target_qty).length / materialCount) * 100);
          return { ...task, progress, materialCount };
        });
      }, [tasks, materials]);

      // 權限過濾：只顯示自己建立的，或是被允許進入的任務
      const accessibleTasks = useMemo(() => {
        return tasksWithProgress.filter(t =>
          t.owner_id === currentUser.id ||
          (t.allowed_users && t.allowed_users.includes(currentUser.id))
        );
      }, [tasksWithProgress, currentUser]);

      const activeTask = useMemo(() => accessibleTasks.find(t => t.id === selectedTaskId), [accessibleTasks, selectedTaskId]);
      const taskMaterials = useMemo(() => materials.filter(m => m.task_id === selectedTaskId), [materials, selectedTaskId]);
      const countingMaterial = useMemo(() => materials.find(m => m.id === countingMaterialId), [materials, countingMaterialId]);

      const handleSaveCount = (newQty) => {
        if (!isConnected) return showToast('系統未連線，無法儲存變更，請檢查網路狀態', 'error');
        if (!countingMaterialId) return;
        const mat = materials.find(m => m.id === countingMaterialId);
        if (mat.counted_qty !== newQty) {
          db.ref(`materials/${countingMaterialId}`).update({ counted_qty: newQty })
            .then(() => {
              db.ref('audit_logs').push({
                task_id: mat.task_id,
                action: 'UPDATE',
                action_label: '更新清點數量',
                entity_name: mat.part_name || mat.part_number,
                changes: [{ field: '已清點數量', old: mat.counted_qty, new: newQty }],
                user_name: currentUser.name,
                timestamp: new Date().toISOString()
              });
              setCountingMaterialId(null);
              showToast("清點數量已同步", "success");
            })
            .catch((error) => {
              showToast("更新失敗，請檢查網路連線", "error");
              console.error(error);
            });
        } else {
          setCountingMaterialId(null);
        }
      };

      const handleImportSuccess = (newMaterials) => {
        if (!isConnected) return showToast('系統未連線，無法匯入', 'error');
        const updates = {};
        newMaterials.forEach(m => {
          updates[`materials/${m.id}`] = m;
        });
        
        db.ref().update(updates)
          .then(() => {
            if(newMaterials.length > 0) {
                db.ref('audit_logs').push({
                  task_id: newMaterials[0].task_id,
                  action: 'CREATE',
                  action_label: '批次匯入物料',
                  entity_name: `共 ${newMaterials.length} 筆`,
                  changes: [],
                  user_name: currentUser.name,
                  timestamp: new Date().toISOString()
                });
            }
            showToast(`成功匯入 ${newMaterials.length} 筆資料`, "success");
          })
          .catch((error) => {
            showToast("匯入失敗", "error");
            console.error(error);
          });
      };
      
      const handleVehicleImportSuccess = (newMaterials) => {
        if (!isConnected) return showToast('系統未連線，無法匯入', 'error');
        const updates = {};
        newMaterials.forEach(m => {
          updates[`vehicle_materials/${m.id}`] = m;
        });
        
        db.ref().update(updates)
          .then(() => {
            showToast(`成功匯入 ${newMaterials.length} 筆資料`, "success");
          })
          .catch((error) => {
            showToast("匯入失敗", "error");
            console.error(error);
          });
      };

      const handleLoginSuccess = (mode, user) => {
        setIsLoggedIn(true);
        setLoginMode(mode);
        if (mode === 'admin') {
          const adminUser = users.find(u => u.role === 'admin') || MOCK_USERS[0];
          setCurrentUser(adminUser);
          setActiveTab('settings');
        } else {
          setCurrentUser(user);
          setActiveTab(user.role === 'operator' ? 'tasks' : 'dashboard');
        }
      };

      const handleTabChange = (tab) => {
        if (tab === 'settings' && loginMode === 'normal') {
          setIsAuthModalOpen(true);
        } else {
          setActiveTab(tab);
          setSelectedTaskId(null);
          setCountingMaterialId(null);
          setSelectedVehicleModelId(null);
          setSelectedVehicleSectionId(null);
        }
      };

      const handleAuthSubmit = (e) => {
        e.preventDefault();
        if (authPassword === adminPassword) {
          setIsAuthModalOpen(false);
          setAuthPassword('');
          setActiveTab('settings');
          setSelectedTaskId(null);
          setCountingMaterialId(null);
          setSelectedVehicleModelId(null);
          setSelectedVehicleSectionId(null);
          showToast('驗證成功', 'success');
        } else {
          showToast('密碼錯誤', 'error');
        }
      };

      return (
        <>
          <ToastContainer />
          
          {isLoading ? (
            <div className="flex h-screen items-center justify-center bg-[#f5f5f7]">
              <div className="flex flex-col items-center gap-5">
                <div className="w-12 h-12 border-4 border-[#e5e5ea] border-t-[#1d1d1f] rounded-full animate-spin"></div>
                <div className="text-center">
                  <p className="text-[#1d1d1f] font-semibold text-base tracking-tight">連線中...</p>
                  <p className="text-[#86868b] text-xs mt-1">正在與伺服器建立連線</p>
                </div>
              </div>
            </div>
          ) : !isLoggedIn ? (
            <LoginScreen onLogin={handleLoginSuccess} adminPassword={adminPassword} users={users} />
          ) : (
            <div className="flex h-screen bg-[#f5f5f7] text-[#1d1d1f] font-sans selection:bg-blue-200/50 overflow-hidden relative">
              
              {/* Mobile Sidebar Overlay */}
              {isSidebarOpen && (
                <div className="fixed inset-0 bg-[#1d1d1f]/20 backdrop-blur-sm z-40 md:hidden transition-opacity duration-300" onClick={() => setIsSidebarOpen(false)}></div>
              )}

              <Sidebar 
                activeTab={activeTab} 
                onTabChange={handleTabChange} 
                currentUser={currentUser} 
                users={users} 
                onLogout={() => setIsLoggedIn(false)}
                loginMode={loginMode}
                isOpen={isSidebarOpen}
                onClose={() => setIsSidebarOpen(false)}
                isDesktopOpen={isDesktopSidebarOpen}
              />
              
              <main className="flex-1 flex flex-col overflow-hidden relative w-full">
                <header className="h-16 sm:h-20 border-b border-[#d2d2d7]/50 flex items-center justify-between px-4 sm:px-8 shrink-0 bg-white/60 backdrop-blur-3xl z-10">
                   <div className="flex items-center">
                     <button onClick={() => setIsSidebarOpen(true)} className="md:hidden mr-3 text-[#1d1d1f] p-2 -ml-2 rounded-full hover:bg-[#f5f5f7] transition-colors">
                       <Icon name="Menu" className="w-5 h-5" />
                     </button>
                     <button onClick={() => setIsDesktopSidebarOpen(!isDesktopSidebarOpen)} className="hidden md:block mr-3 text-[#1d1d1f] p-2 -ml-2 rounded-full hover:bg-[#f5f5f7] transition-colors">
                       <Icon name="Menu" className="w-5 h-5" />
                     </button>
                     <div className="text-[#86868b] font-semibold text-xs sm:text-sm tracking-wide truncate max-w-[150px] sm:max-w-none">
                       {activeTab === 'dashboard' ? '營運總覽' : 
                        activeTab === 'tasks' ? (selectedTaskId ? `任務 / ${activeTask?.title}` : '任務清單') : 
                        activeTab === 'vehicle_models' ? '車型管理' : '後台管理系統'}
                     </div>
                   </div>
                   <div className="flex items-center space-x-3 sm:space-x-5">
                     <div className={`hidden sm:flex items-center text-xs font-bold px-3 py-1.5 rounded-full ${isConnected ? 'text-[#34c759] bg-[#34c759]/10' : 'text-[#ff3b30] bg-[#ff3b30]/10'}`}>
                       <span className={`w-2 h-2 rounded-full mr-2 ${isConnected ? 'bg-[#34c759] animate-pulse shadow-[0_0_8px_rgba(52,199,89,0.5)]' : 'bg-[#ff3b30] shadow-[0_0_8px_rgba(255,59,48,0.5)]'}`}></span> 
                       {isConnected ? '系統已連線' : '系統未連線'}
                     </div>
                     <div className={`sm:hidden flex items-center justify-center w-8 h-8 rounded-full ${isConnected ? 'bg-[#34c759]/10' : 'bg-[#ff3b30]/10'}`}>
                       <span className={`w-2 h-2 rounded-full ${isConnected ? 'bg-[#34c759] animate-pulse shadow-[0_0_8px_rgba(52,199,89,0.5)]' : 'bg-[#ff3b30] shadow-[0_0_8px_rgba(255,59,48,0.5)]'}`}></span>
                     </div>
                     <button onClick={() => showToast('目前沒有新通知', 'info')} className="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded-full bg-white border border-[#d2d2d7]/50 shadow-sm hover:bg-[#f5f5f7] transition-colors text-[#1d1d1f] relative">
                       <Icon name="Bell" className="w-4 h-4" />
                       <span className="absolute top-2 right-2 sm:top-2.5 sm:right-2.5 w-2 h-2 bg-[#ff3b30] border-2 border-white rounded-full"></span>
                     </button>
                   </div>
                </header>

                <div className="flex-1 p-4 sm:p-6 lg:p-10 overflow-auto relative scroll-smooth">
                  {activeTab === 'dashboard' && <Dashboard tasks={accessibleTasks} materials={materials} />}
                  {activeTab === 'settings' && <SettingsView users={users} isConnected={isConnected} />}
                  
                  {activeTab === 'tasks' && !selectedTaskId && <TaskList tasks={accessibleTasks} materials={materials} onSelectTask={setSelectedTaskId} currentUser={currentUser} users={users} isConnected={isConnected} />}
                  {activeTab === 'tasks' && selectedTaskId && activeTask && (
                    <MaterialManagement task={activeTask} materials={taskMaterials} onBack={() => setSelectedTaskId(null)} onCount={setCountingMaterialId} onImportSuccess={handleImportSuccess} currentUser={currentUser} auditLogs={auditLogs.filter(l => l.task_id === activeTask.id)} isConnected={isConnected} />
                  )}
                  {activeTab === 'tasks' && countingMaterial && (
                    <CountMode material={countingMaterial} onSave={handleSaveCount} onCancel={() => setCountingMaterialId(null)}/>
                  )}
                  
                  {activeTab === 'vehicle_models' && !selectedVehicleModelId && (
                    <VehicleModelList 
                      models={vehicleModels} 
                      onSelectModel={setSelectedVehicleModelId} 
                      currentUser={currentUser} 
                      isConnected={isConnected} 
                    />
                  )}
                  {activeTab === 'vehicle_models' && selectedVehicleModelId && !selectedVehicleSectionId && (
                    <VehicleSectionList 
                      model={vehicleModels.find(m => m.id === selectedVehicleModelId)} 
                      sections={vehicleSections.filter(s => s.model_id === selectedVehicleModelId)} 
                      onBack={() => setSelectedVehicleModelId(null)} 
                      onSelectSection={setSelectedVehicleSectionId} 
                      currentUser={currentUser} 
                      isConnected={isConnected} 
                    />
                  )}
                  {activeTab === 'vehicle_models' && selectedVehicleModelId && selectedVehicleSectionId && (
                    <VehicleMaterialManagement 
                      model={vehicleModels.find(m => m.id === selectedVehicleModelId)}
                      section={vehicleSections.find(s => s.id === selectedVehicleSectionId)}
                      materials={vehicleMaterials.filter(m => m.section_id === selectedVehicleSectionId)}
                      onBack={() => setSelectedVehicleSectionId(null)}
                      currentUser={currentUser}
                      isConnected={isConnected}
                      onImportSuccess={handleVehicleImportSuccess}
                    />
                  )}

                </div>
              </main>

              {/* 密碼驗證 Modal (一般模式進入後台時觸發) */}
              <Modal isOpen={isAuthModalOpen} onClose={() => {setIsAuthModalOpen(false); setAuthPassword('');}} title="安全驗證">
                <form onSubmit={handleAuthSubmit} className="space-y-4 sm:space-y-5">
                  <div className="text-xs sm:text-sm text-[#86868b] mb-3 sm:mb-4">進入後台管理系統需要管理者權限，請輸入管理者密碼。</div>
                  <div>
                    <Input 
                      type="password" 
                      value={authPassword} 
                      onChange={e => setAuthPassword(e.target.value)} 
                      placeholder="請輸入管理者密碼" 
                      className="text-center tracking-widest"
                      autoFocus 
                    />
                  </div>
                  <div className="pt-4 flex justify-end space-x-3">
                    <Button type="button" variant="secondary" onClick={() => {setIsAuthModalOpen(false); setAuthPassword('');}}>取消</Button>
                    <Button type="submit">確認</Button>
                  </div>
                </form>
              </Modal>
            </div>
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
